<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>挑战拼图｜iPad 同步页</title>
  <style>
    :root {
      --bg: #d5d1c8;
      --ink: #161616;
      --muted: rgba(22, 22, 22, .66);
      --line: rgba(19, 19, 19, .42);
      --red: #f13b2f;
      --red-dark: #bb201b;
      --thu: #5a4bbc;
      --pku: #b72535;
      --paper: #f4f4f1;
      --tile: #111;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; overflow-x: hidden; overflow-y: auto; }
    body {
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, .55), transparent 30%),
        radial-gradient(circle at 72% 40%, rgba(90, 80, 66, .13), transparent 34%),
        linear-gradient(115deg, rgba(255, 255, 255, .28), transparent 44%),
        repeating-linear-gradient(12deg, rgba(0, 0, 0, .035) 0 1px, transparent 1px 8px),
        repeating-linear-gradient(96deg, rgba(255, 255, 255, .18) 0 1px, transparent 1px 13px),
        var(--bg);
      color: var(--ink);
      font-family: "Arial Black", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .screen {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: clamp(8px, 1.2vh, 14px);
      padding:
        calc(clamp(10px, 1.6vh, 20px) + env(safe-area-inset-top))
        clamp(16px, 4vw, 74px)
        calc(clamp(24px, 4vh, 64px) + env(safe-area-inset-bottom));
    }
    .screen::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, .08), rgba(0, 0, 0, .05)),
        repeating-radial-gradient(circle at 50% 50%, rgba(0, 0, 0, .03) 0 1px, transparent 1px 5px);
      mix-blend-mode: multiply;
      opacity: .6;
    }
    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 2vw;
      padding: 0;
      z-index: 1;
    }
    .team { display: flex; align-items: baseline; gap: 12px; min-width: 0; }
    .team.right { justify-self: end; flex-direction: row-reverse; }
    .bar { width: 8px; height: .82em; align-self: center; }
    .name {
      color: var(--muted);
      font-size: clamp(14px, 2vmin, 24px);
      font-weight: 900;
      letter-spacing: .08em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, .62);
    }
    .score {
      font-size: clamp(30px, 5vmin, 68px);
      line-height: 1;
      font-weight: 950;
      text-shadow: 0 2px 0 rgba(255, 255, 255, .72);
    }
    .center { justify-self: center; text-align: center; display: grid; gap: .5vh; }
    .tag {
      padding: .2em .8em;
      color: #101010;
      background: transparent;
      font-size: clamp(13px, 1.8vmin, 22px);
      font-weight: 900;
      letter-spacing: .15em;
      text-shadow: 0 2px 0 rgba(255, 255, 255, .72);
    }
    .clock {
      font-size: clamp(30px, 5.6vmin, 68px);
      line-height: .9;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 3px 0 rgba(255, 255, 255, .72);
    }
    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding-top: clamp(6px, 1.2vh, 14px);
      z-index: 1;
    }
    .boardPanel, .piecePanel {
      display: grid;
      place-items: center;
      min-height: 0;
      width: 100%;
    }
    .board {
      display: grid;
      gap: 0;
      background: transparent;
      touch-action: none;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, .14));
    }
    .cell {
      width: var(--cell, 5vmin);
      height: var(--cell, 5vmin);
      border-radius: 0;
      display: grid;
      place-items: center;
      font-size: calc(var(--cell, 5vmin) * .44);
      font-weight: 950;
      line-height: 1;
    }
    .cell.on {
      background: #f7f7f2;
      border: 1.5px solid #5c5c5c;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .24);
    }
    .cell.preview {
      background: #f7f7f2;
      border: 2px solid var(--red);
      box-shadow: inset 0 0 0 2px #fff, 0 0 0 3px rgba(241, 59, 47, .26);
    }
    .cell.badPreview {
      background: #181818;
      border: 2px solid var(--red);
      box-shadow: inset 0 0 0 2px rgba(241, 59, 47, .45);
    }
    .cell.placed {
      background: #f7f7f2;
      color: #151515;
      border: 1.5px solid #5c5c5c;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .08);
    }
    .cell.blocked {
      background: var(--tile);
      border: 1.5px solid #5c5c5c;
    }
    .cell.off { background: transparent; }
    .pieces {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: end;
      gap: clamp(10px, 2vw, 34px);
      padding: 2px 2vw 8px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .pieces::-webkit-scrollbar { display: none; }
    .pieces.manyPieces {
      justify-content: flex-start;
    }
    .pieceCard {
      position: relative;
      color: #fff;
      background: transparent;
      border: 0;
      padding: 0;
      display: grid;
      justify-items: center;
      align-content: end;
      min-width: calc(var(--piece-cols, 2) * var(--slot-cell, 32px) + 34px);
      min-height: calc(var(--piece-rows, 2) * var(--slot-cell, 32px) + 58px);
      touch-action: none;
      user-select: none;
    }
    .pieceCard.current { cursor: grab; }
    .pieceCard.current .pieceSlot {
      box-shadow: 0 0 0 4px rgba(241, 59, 47, .18), 0 10px 18px rgba(0, 0, 0, .12);
      background: rgba(255, 255, 255, .12);
    }
    .pieceCard.current .pieceNo { transform: translateY(-2px); }
    .pieceCard.placed { opacity: .34; }
    .pieceCard.locked { opacity: .62; }
    .pieceNo {
      position: absolute;
      top: 0;
      width: clamp(48px, 6vmin, 76px);
      height: clamp(34px, 4.6vmin, 54px);
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #ff473a, var(--red));
      color: #fff;
      font-weight: 950;
      font-size: clamp(24px, 4.2vmin, 50px);
      line-height: 1;
      text-shadow: 0 2px 0 rgba(0, 0, 0, .22);
      z-index: 2;
    }
    .pieceSlot {
      margin-top: clamp(30px, 4.4vmin, 50px);
      width: calc(var(--piece-cols, 2) * var(--slot-cell, 32px) + 24px);
      height: calc(var(--piece-rows, 2) * var(--slot-cell, 32px) + 24px);
      display: grid;
      place-items: center;
      border: clamp(3px, .5vmin, 6px) solid var(--red);
      border-radius: 8px;
      background: rgba(255, 255, 255, .04);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .34);
    }
    .piece { display: grid; gap: 3px; justify-content: start; }
    .pCell {
      width: var(--mini-cell, clamp(18px, 2.8vmin, 38px));
      height: var(--mini-cell, clamp(18px, 2.8vmin, 38px));
      border-radius: 0;
    }
    .pCell.on {
      background: #f7f7f2;
      border: 2px solid #6c6c6c;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .62);
    }
    .pCell.off { background: transparent; }
    .footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      justify-items: center;
      gap: clamp(8px, 1.3vh, 14px);
      z-index: 2;
    }
    .message {
      justify-self: center;
      max-width: 92vw;
      text-align: center;
      color: #f8f8f5;
      font-size: clamp(18px, 2.8vmin, 38px);
      font-weight: 950;
      letter-spacing: .03em;
      line-height: 1.2;
      text-shadow:
        -2px -2px 0 #222,
        2px -2px 0 #222,
        -2px 2px 0 #222,
        2px 2px 0 #222,
        0 4px 8px rgba(0, 0, 0, .32);
    }
    .tools {
      width: min(760px, 100%);
      min-height: 76px;
      display: grid;
      grid-template-columns: minmax(102px, .85fr) repeat(3, minmax(112px, 1fr));
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 1.2vw, 14px);
      padding: clamp(8px, 1.2vmin, 12px);
      border: 3px solid rgba(18, 18, 18, .78);
      border-radius: 8px;
      background: rgba(244, 244, 241, .86);
      box-shadow: 0 14px 28px rgba(0, 0, 0, .16), inset 0 0 0 1px rgba(255, 255, 255, .74);
      opacity: 1;
    }
    .stepBadge {
      min-width: 0;
      min-height: 56px;
      display: grid;
      place-items: center;
      padding: 10px 14px;
      border: 2px solid rgba(22, 22, 22, .72);
      border-radius: 4px;
      background: #151515;
      color: #f7f7f2;
      font-size: clamp(18px, 2.3vmin, 26px);
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 0 rgba(0, 0, 0, .24);
    }
    .toolBtn {
      min-width: 0;
      min-height: 56px;
      border: 3px solid rgba(22, 22, 22, .86);
      border-radius: 4px;
      background: #f7f7f2;
      color: var(--ink);
      font-weight: 950;
      padding: 10px 12px;
      cursor: pointer;
      font-size: clamp(18px, 2.2vmin, 26px);
      line-height: 1;
      box-shadow: 0 4px 0 rgba(22, 22, 22, .72);
      white-space: nowrap;
    }
    .toolBtn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(22, 22, 22, .72);
    }
    .toolBtn:disabled { opacity: .38; cursor: not-allowed; }
    .ghost {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      transform: none;
      opacity: .86;
      background: transparent;
      padding: 0;
      filter: drop-shadow(0 14px 20px rgba(0, 0, 0, .3));
    }
    .result {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      pointer-events: none;
      background: rgba(30, 24, 16, .16);
      z-index: 5;
    }
    .judged .result { display: grid; }
    .resultBox {
      border: 4px solid var(--red);
      border-radius: 8px;
      background: rgba(238, 238, 232, .96);
      padding: clamp(24px, 4vmin, 56px);
      text-align: center;
      box-shadow: 0 32px 90px rgba(0, 0, 0, .58);
    }
    .resultTitle { color: #171410; font-size: clamp(38px, 7vmin, 96px); font-weight: 950; letter-spacing: .12em; }
    .resultSteps { margin-top: 14px; color: var(--muted); font-size: clamp(18px, 2.4vmin, 30px); }
    .launcher { position: fixed; right: 18px; top: 16px; display: flex; gap: 10px; opacity: .22; z-index: 8; }
    .launcher:hover { opacity: 1; }
    .launcher a, .launcher button {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: rgba(247, 247, 242, .86);
      color: var(--ink);
      text-decoration: none;
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .playerMark {
      position: fixed;
      left: 18px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 8;
      min-height: 32px;
      display: grid;
      place-items: center;
      padding: 6px 12px;
      border: 2px solid rgba(22, 22, 22, .72);
      border-radius: 4px;
      background: rgba(247, 247, 242, .84);
      color: var(--ink);
      font-size: 13px;
      font-weight: 950;
      letter-spacing: .08em;
      opacity: .46;
    }
    :fullscreen .launcher { display: none; }
    :fullscreen .playerMark { display: none; }
    @media (max-aspect-ratio: 1/1) {
      .screen {
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        grid-template-rows: auto auto auto auto;
        padding-inline: clamp(12px, 3vw, 28px);
      }
      .pieces {
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
        max-height: none;
        overflow: visible;
      }
      .tools {
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }
      .stepBadge {
        grid-column: 1 / -1;
      }
      #clear {
        grid-column: 1 / -1;
      }
    }
    @media (max-width: 560px) {
      .tools {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="idle">
  <main class="screen">
    <header class="hud">
      <div class="team"><span class="bar" style="background:var(--thu)"></span><span class="name">清华</span><span class="score" id="thuScore">0</span></div>
      <div class="center"><div class="tag" id="phase">WAITING</div><div class="clock" id="clock">--:--</div></div>
      <div class="team right"><span class="bar" style="background:var(--pku)"></span><span class="name">北大</span><span class="score" id="pkuScore">0</span></div>
    </header>

    <section class="stage">
      <div class="boardPanel"><div class="board" id="board"></div></div>
    </section>
    <section class="piecePanel"><div class="pieces" id="pieces"></div></section>

    <footer class="footer">
      <div class="message" id="message">打开主持人控制台，开始比赛。</div>
      <div class="tools">
        <div class="stepBadge" id="localStep">Step 0</div>
        <button class="toolBtn" id="rotate">↻ 旋转</button>
        <button class="toolBtn" id="undo">上一步</button>
        <button class="toolBtn" id="clear">清空</button>
      </div>
    </footer>
  </main>
  <div class="result"><div class="resultBox"><div class="resultTitle" id="resultTitle">--</div><div class="resultSteps" id="resultSteps"></div></div></div>
  <div class="launcher"><a href="admin.html" target="_blank">控制台</a><button id="full">全屏</button></div>
  <div class="playerMark" id="playerMark">未选择队伍</div>

  <script src="core.js"></script>
  <script src="../sync.js"></script>
  <script>
  (() => {
    const ROOM = 'challenge-puzzle';
    const PROGRESS_ROOM_PREFIX = 'challenge-puzzle-progress-';
    const STORAGE = 'challenge-puzzle:v1:state';
    const PROGRESS_STORAGE_PREFIX = 'challenge-puzzle:v1:progress:';
    const TEAM_STORAGE = 'challenge-puzzle:v1:team';
    const CHANNEL = 'challenge-puzzle-v1';
    const C = window.ChallengePuzzle;
    const $ = id => document.getElementById(id);
    const E = {
      thuScore: $('thuScore'), pkuScore: $('pkuScore'), phase: $('phase'), clock: $('clock'),
      board: $('board'), pieces: $('pieces'), message: $('message'), resultTitle: $('resultTitle'),
      resultSteps: $('resultSteps'), full: $('full'), localStep: $('localStep'), rotate: $('rotate'),
      undo: $('undo'), clear: $('clear'), playerMark: $('playerMark')
    };
    const TEAM_LABELS = { thu: '清华', pku: '北大' };
    const TEAM = readTeam();
    let progressSync = null;
    let state = load() || C.freshState();
    let lastPuzzleKey = '';
    let work = freshWork();
    let hover = null;
    let drag = null;
    let dragInfo = null;

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE)); } catch (_) { return null; }
    }

    function readTeam() {
      let value = '';
      try {
        const queryTeam = new URLSearchParams(location.search).get('team');
        if (queryTeam === 'thu' || queryTeam === 'pku') {
          localStorage.setItem(TEAM_STORAGE, queryTeam);
          value = queryTeam;
        } else {
          value = localStorage.getItem(TEAM_STORAGE) || '';
        }
      } catch (_) {}
      return value === 'thu' || value === 'pku' ? value : '';
    }

    function accept(next) {
      state = next || C.freshState();
      localStorage.setItem(STORAGE, JSON.stringify(state));
      ensureWork();
      publishProgress();
      render();
    }

    function freshWork() {
      return { puzzleId: '', round: 0, placements: [], rotation: 0 };
    }

    function workKey() {
      if (!state.puzzle) return '';
      return `${STORAGE}:work:${state.round}:${state.puzzle.id}`;
    }

    function ensureWork() {
      if (!state.puzzle) {
        work = freshWork();
        return;
      }
      const key = workKey();
      if (work.puzzleId === state.puzzle.id && work.round === state.round) return;
      try {
        work = JSON.parse(localStorage.getItem(key)) || freshWork();
      } catch (_) {
        work = freshWork();
      }
      work.puzzleId = state.puzzle.id;
      work.round = state.round;
      work.placements = Array.isArray(work.placements) ? work.placements : [];
      work.rotation = Number.isFinite(work.rotation) ? work.rotation : 0;
    }

    function saveWork() {
      const key = workKey();
      if (key) localStorage.setItem(key, JSON.stringify(work));
      publishProgress();
    }

    function progressSnapshot() {
      return {
        team: TEAM,
        round: state.round || 0,
        puzzleId: state.puzzle ? state.puzzle.id : '',
        phase: state.phase || 'idle',
        placements: work.placements || [],
        rotation: work.rotation || 0,
        step: state.puzzle ? nextIndex() : 0,
        updatedAt: Date.now(),
      };
    }

    function publishProgress() {
      if (!TEAM) return;
      const snapshot = progressSnapshot();
      try { localStorage.setItem(PROGRESS_STORAGE_PREFIX + TEAM, JSON.stringify(snapshot)); } catch (_) {}
      if (progressSync && state.puzzle) {
        progressSync.pushState(snapshot).catch(() => {});
      }
    }

    function timeLeft() {
      if (state.phase !== 'solving') return 0;
      return Math.max(0, state.endsAt - Date.now());
    }

    function fmt(ms) {
      const total = Math.ceil(ms / 1000);
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function phaseText() {
      return { idle: 'WAITING', solving: '同时作答', scoring: '录入成绩', judged: '结果' }[state.phase] || 'WAITING';
    }

    function resultText() {
      if (state.winner === 'thu') return '清华胜';
      if (state.winner === 'pku') return '北大胜';
      if (state.winner === 'draw') return '平局';
      return '--';
    }

    function drawShape(el, rows, cellClass, activeClass) {
      const cols = Math.max(...rows.map(r => r.length));
      el.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      rows.forEach(row => {
        for (let i = 0; i < cols; i += 1) {
          const d = document.createElement('div');
          d.className = `${cellClass} ${row[i] === '#' ? activeClass : 'off'}`;
          el.appendChild(d);
        }
      });
    }

    function nextIndex() {
      return Math.min(work.placements.length, state.puzzle ? state.puzzle.pieces.length : 0);
    }

    function placedMap() {
      const map = new Map();
      if (!state.puzzle) return map;
      work.placements.forEach((placement, index) => {
        const shape = C.orientations(state.puzzle.pieces[index])[placement.rotation];
        shape.cells.forEach(c => map.set(`${placement.x + c.x},${placement.y + c.y}`, index + 1));
      });
      return map;
    }

    function candidate(index, x, y, rotation) {
      if (!state.puzzle || index < 0 || index >= state.puzzle.pieces.length) return { ok: false, cells: [] };
      const shape = C.orientations(state.puzzle.pieces[index])[rotation] || C.orientations(state.puzzle.pieces[index])[0];
      const occupied = placedMap();
      const cells = shape.cells.map(c => ({ x: x + c.x, y: y + c.y }));
      const ok = cells.every(c => {
        const row = state.puzzle.board[c.y] || '';
        return row[c.x] === '#' && !occupied.has(`${c.x},${c.y}`);
      });
      return { ok, cells };
    }

    function activeCandidate() {
      if (!hover || state.phase !== 'solving') return null;
      const index = nextIndex();
      if (!state.puzzle || index >= state.puzzle.pieces.length) return null;
      const rotations = C.orientations(state.puzzle.pieces[index]);
      return candidate(index, hover.x, hover.y, work.rotation % rotations.length);
    }

    function drawPieceGrid(piece, cellSizeClass) {
      const grid = document.createElement('div');
      grid.className = 'piece';
      const cols = Math.max(...piece.map(r => r.length));
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      piece.forEach((row, y) => {
        for (let i = 0; i < cols; i += 1) {
          const d = document.createElement('div');
          d.className = `${cellSizeClass} ${row[i] === '#' ? 'on' : 'off'}`;
          d.dataset.x = String(i);
          d.dataset.y = String(y);
          grid.appendChild(d);
        }
      });
      return grid;
    }

    function pieceBounds(rows) {
      return {
        cols: Math.max(...rows.map(r => r.length)),
        rows: rows.length,
      };
    }

    function drawPuzzle() {
      ensureWork();
      const key = state.puzzle ? `${state.puzzle.id}:${state.phase}:${JSON.stringify(work.placements)}:${work.rotation}:${hover ? `${hover.x},${hover.y}` : ''}` : '';
      if (key === lastPuzzleKey) return;
      lastPuzzleKey = key;
      E.board.innerHTML = '';
      E.pieces.innerHTML = '';
      E.pieces.classList.remove('manyPieces');
      if (!state.puzzle) return;
      E.pieces.classList.toggle('manyPieces', state.puzzle.pieces.length > 8);
      const rows = state.puzzle.board;
      const answer = state.phase === 'judged' ? C.answerGrid(state.puzzle, state.puzzle.maxStep) : null;
      const cols = Math.max(...rows.map(r => r.length));
      const placed = placedMap();
      const preview = activeCandidate();
      const previewKeys = new Set((preview ? preview.cells : []).map(c => `${c.x},${c.y}`));
      const viewportHeight = window.visualViewport ? window.visualViewport.height : innerHeight;
      const isPortrait = matchMedia('(max-aspect-ratio: 1/1)').matches;
      const maxBoardHeight = viewportHeight * (isPortrait ? .28 : .36);
      const maxBoardWidth = innerWidth * (isPortrait ? .86 : .74);
      const cell = Math.max(22, Math.min(58, Math.floor(maxBoardHeight / rows.length), Math.floor(maxBoardWidth / cols)));
      E.board.style.setProperty('--cell', `${cell}px`);
      E.board.style.gridTemplateColumns = `repeat(${cols}, var(--cell))`;
      rows.forEach((row, y) => {
        for (let x = 0; x < cols; x += 1) {
          const d = document.createElement('div');
          d.dataset.x = String(x);
          d.dataset.y = String(y);
          const mark = answer && answer[y] ? answer[y][x] : '';
          const placedNo = placed.get(`${x},${y}`);
          if (mark && mark !== '·') {
            d.className = 'cell placed';
            d.textContent = mark;
          } else if (placedNo) {
            d.className = 'cell placed';
            d.textContent = placedNo;
          } else if (row[x] === '#') {
            d.className = `cell ${previewKeys.has(`${x},${y}`) ? (preview.ok ? 'preview' : 'badPreview') : 'on'}`;
          } else if (x < row.length && row[x] === '.') {
            d.className = 'cell blocked';
          } else {
            d.className = 'cell off';
          }
          E.board.appendChild(d);
        }
      });
      state.puzzle.pieces.forEach((piece, i) => {
        const card = document.createElement('div');
        const next = nextIndex();
        card.className = `pieceCard ${i < next ? 'placed' : i === next && state.phase === 'solving' ? 'current' : 'locked'}`;
        card.dataset.index = String(i);
        const no = document.createElement('div');
        no.className = 'pieceNo';
        no.textContent = String(i + 1);
        const activePiece = i === next && state.phase === 'solving'
          ? C.orientations(piece)[work.rotation % C.orientations(piece).length].rows
          : piece;
        const bounds = pieceBounds(activePiece);
        const trayCell = Math.max(16, Math.min(36, Math.floor((innerWidth * .74) / Math.max(10, state.puzzle.pieces.length * 4.4))));
        card.style.setProperty('--piece-cols', String(bounds.cols));
        card.style.setProperty('--piece-rows', String(bounds.rows));
        card.style.setProperty('--slot-cell', `${trayCell}px`);
        card.style.setProperty('--mini-cell', `${trayCell}px`);
        const slot = document.createElement('div');
        slot.className = 'pieceSlot';
        slot.appendChild(drawPieceGrid(activePiece, 'pCell'));
        card.append(no, slot);
        E.pieces.appendChild(card);
      });
    }

    function render() {
      document.body.className = state.phase || 'idle';
      E.thuScore.textContent = state.scores.thu;
      E.pkuScore.textContent = state.scores.pku;
      E.phase.textContent = state.round ? `第 ${state.round} 题 · ${phaseText()}` : phaseText();
      E.clock.textContent = state.phase === 'solving' ? fmt(timeLeft()) : '--:--';
      E.message.textContent = state.message || '';
      E.resultTitle.textContent = resultText();
      E.resultSteps.textContent = state.results.thu === null || state.results.pku === null
        ? ''
        : `清华 Step ${state.results.thu} / 北大 Step ${state.results.pku}`;
      E.localStep.textContent = `Step ${state.puzzle ? nextIndex() : 0}`;
      E.playerMark.textContent = TEAM ? `${TEAM_LABELS[TEAM]}选手端` : '未选择队伍';
      E.playerMark.style.borderColor = TEAM === 'thu' ? 'var(--thu)' : TEAM === 'pku' ? 'var(--pku)' : 'rgba(22, 22, 22, .72)';
      E.rotate.disabled = E.undo.disabled = E.clear.disabled = state.phase !== 'solving' || !state.puzzle;
      drawPuzzle();
    }

    function boardCellFromPoint(x, y) {
      if (!state.puzzle) return null;
      const rect = E.board.getBoundingClientRect();
      if (x < rect.left || x >= rect.right || y < rect.top || y >= rect.bottom) return null;
      const cols = Math.max(...state.puzzle.board.map(r => r.length));
      const cellSize = parseFloat(getComputedStyle(E.board).getPropertyValue('--cell')) || (rect.width / cols);
      const cellX = Math.floor((x - rect.left) / cellSize);
      const cellY = Math.floor((y - rect.top) / cellSize);
      const row = state.puzzle.board[cellY] || '';
      if (cellX < 0 || cellY < 0 || cellY >= state.puzzle.board.length || cellX >= cols || row[cellX] === ' ') return null;
      return { x: cellX, y: cellY };
    }

    function dragTargetFromPoint(x, y) {
      const cell = boardCellFromPoint(x, y);
      if (!cell) return null;
      const grab = dragInfo ? dragInfo.grab : { x: 0, y: 0 };
      return { x: cell.x - grab.x, y: cell.y - grab.y };
    }

    function nearestGrabCell(card, event) {
      const cells = [...card.querySelectorAll('.pCell.on')];
      if (cells.length === 0) return { x: 0, y: 0 };
      let best = cells[0];
      let bestDistance = Infinity;
      cells.forEach(cell => {
        const rect = cell.getBoundingClientRect();
        const dx = event.clientX - (rect.left + rect.width / 2);
        const dy = event.clientY - (rect.top + rect.height / 2);
        const distance = dx * dx + dy * dy;
        if (distance < bestDistance) {
          best = cell;
          bestDistance = distance;
        }
      });
      return { x: Number(best.dataset.x) || 0, y: Number(best.dataset.y) || 0 };
    }

    function placeAt(x, y) {
      if (!state.puzzle || state.phase !== 'solving') return false;
      const index = nextIndex();
      if (index >= state.puzzle.pieces.length) return false;
      const rotations = C.orientations(state.puzzle.pieces[index]);
      const rotation = work.rotation % rotations.length;
      const trial = candidate(index, x, y, rotation);
      if (!trial.ok) return false;
      work.placements.push({ x, y, rotation });
      work.rotation = 0;
      hover = null;
      saveWork();
      lastPuzzleKey = '';
      render();
      return true;
    }

    function beginDrag(event, card) {
      if (!state.puzzle || state.phase !== 'solving') return;
      const index = Number(card.dataset.index);
      if (index !== nextIndex()) return;
      event.preventDefault();
      drag = document.createElement('div');
      drag.className = 'ghost';
      const rows = C.orientations(state.puzzle.pieces[index])[work.rotation % C.orientations(state.puzzle.pieces[index]).length].rows;
      const grab = nearestGrabCell(card, event);
      const miniCell = getComputedStyle(card).getPropertyValue('--mini-cell');
      if (miniCell) drag.style.setProperty('--mini-cell', miniCell);
      drag.appendChild(drawPieceGrid(rows, 'pCell'));
      document.body.appendChild(drag);
      const anchor = drag.querySelector(`.pCell.on[data-x="${grab.x}"][data-y="${grab.y}"]`) || drag.querySelector('.pCell.on');
      const anchorRect = anchor.getBoundingClientRect();
      const dragRect = drag.getBoundingClientRect();
      dragInfo = {
        startX: event.clientX,
        startY: event.clientY,
        grab,
        ghostOffsetX: anchorRect.left + anchorRect.width / 2 - dragRect.left,
        ghostOffsetY: anchorRect.top + anchorRect.height / 2 - dragRect.top,
      };
      moveDrag(event);
      document.addEventListener('pointermove', moveDrag);
      document.addEventListener('pointerup', endDrag, { once: true });
    }

    function moveDrag(event) {
      if (!drag) return;
      drag.style.left = `${event.clientX - dragInfo.ghostOffsetX}px`;
      drag.style.top = `${event.clientY - dragInfo.ghostOffsetY}px`;
      hover = dragTargetFromPoint(event.clientX, event.clientY);
      lastPuzzleKey = '';
      render();
    }

    function endDrag(event) {
      const target = dragTargetFromPoint(event.clientX, event.clientY);
      const moved = dragInfo ? Math.hypot(event.clientX - dragInfo.startX, event.clientY - dragInfo.startY) : 0;
      if (drag) drag.remove();
      drag = null;
      dragInfo = null;
      document.removeEventListener('pointermove', moveDrag);
      if (target && placeAt(target.x, target.y)) return;
      if (moved < 10) {
        rotateCurrent();
        return;
      }
      hover = null;
      lastPuzzleKey = '';
      render();
    }

    function rotateCurrent() {
      if (!state.puzzle || state.phase !== 'solving') return;
      const index = nextIndex();
      if (index >= state.puzzle.pieces.length) return;
      work.rotation = (work.rotation + 1) % C.orientations(state.puzzle.pieces[index]).length;
      saveWork();
      lastPuzzleKey = '';
      render();
    }

    E.pieces.addEventListener('pointerdown', event => {
      const card = event.target.closest('.pieceCard');
      if (card) beginDrag(event, card);
    });
    E.board.addEventListener('pointermove', event => {
      if (!drag) return;
    });
    E.board.addEventListener('pointerleave', () => {
      if (drag) return;
      hover = null;
      lastPuzzleKey = '';
      render();
    });
    E.board.addEventListener('click', event => {
      const target = boardCellFromPoint(event.clientX, event.clientY);
      if (target) placeAt(target.x, target.y);
    });
    E.rotate.onclick = () => {
      rotateCurrent();
    };
    E.undo.onclick = () => {
      if (!state.puzzle || state.phase !== 'solving' || work.placements.length === 0) return;
      work.placements.pop();
      work.rotation = 0;
      hover = null;
      saveWork();
      lastPuzzleKey = '';
      render();
    };
    E.clear.onclick = () => {
      if (!state.puzzle || state.phase !== 'solving') return;
      work.placements = [];
      work.rotation = 0;
      hover = null;
      saveWork();
      lastPuzzleKey = '';
      render();
    };

    window.addEventListener('storage', e => { if (e.key === STORAGE) accept(load()); });
    if ('BroadcastChannel' in window) {
      const bc = new BroadcastChannel(CHANNEL);
      bc.onmessage = e => accept(e.data);
    }
    if (window.Sync && Sync.BACKEND) {
      Sync.display(ROOM, accept);
      if (TEAM) {
        progressSync = Sync.console(`${PROGRESS_ROOM_PREFIX}${TEAM}`);
        publishProgress();
      }
    }

    setInterval(render, 250);
    window.addEventListener('resize', () => { lastPuzzleKey = ''; render(); });
    window.visualViewport?.addEventListener('resize', () => { lastPuzzleKey = ''; render(); });

    let wake = null;
    async function keepAwake() { try { wake = await navigator.wakeLock.request('screen'); } catch (_) {} }
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') keepAwake(); });
    keepAwake();

    E.full.onclick = () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen?.();
    };
    document.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'f') E.full.click(); });
    publishProgress();
    render();
  })();
  </script>
</body>
</html>
