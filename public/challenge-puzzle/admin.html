<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>挑战拼图 控制台</title>
  <style>
    :root {
      --bg: #0b0a07;
      --panel: #171410;
      --panel-2: #211c15;
      --ink: #f4ecd9;
      --muted: rgba(244, 236, 217, .62);
      --line: rgba(231, 199, 130, .22);
      --gold: #d7ae59;
      --thu: #6d59c9;
      --pku: #b92333;
      --ok: #2f8f57;
      --bad: #b93642;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(90deg, rgba(215, 174, 89, .07) 1px, transparent 1px),
        linear-gradient(180deg, rgba(215, 174, 89, .05) 1px, transparent 1px),
        radial-gradient(circle at 26% 8%, rgba(109, 89, 201, .22), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(185, 35, 51, .18), transparent 30%),
        var(--bg);
      background-size: 42px 42px, 42px 42px, auto, auto, auto;
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input, select { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: #ffffff0d;
      color: var(--ink);
      border-radius: 8px;
      min-height: 42px;
      padding: 10px 12px;
      cursor: pointer;
    }
    button:disabled { opacity: .38; cursor: not-allowed; }
    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #050403;
      color: var(--ink);
      padding: 8px 10px;
    }
    select option { background: #15120e; }
    label { display: block; margin: 0 0 6px; color: var(--muted); font-size: 12px; }
    .app { display: grid; grid-template-columns: 320px minmax(0, 1fr) 340px; gap: 14px; padding: 14px; }
    .top, .panel {
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, .46);
    }
    .top { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 16px 18px; }
    .topActions { display: grid; gap: 8px; min-width: 260px; }
    h1 { margin: 0; font-size: 28px; letter-spacing: .04em; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    .sub, .hint { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .sec { padding: 15px; border-bottom: 1px solid var(--line); }
    .sec:last-child { border-bottom: 0; }
    .stack { display: grid; gap: 10px; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .primary { background: linear-gradient(180deg, #f0d28d, #b9832f); color: #1a1205; font-weight: 900; }
    .good { background: color-mix(in srgb, var(--ok) 72%, #000); }
    .bad { background: color-mix(in srgb, var(--bad) 72%, #000); }
    .metric { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 15px; border-bottom: 1px solid var(--line); }
    .m { background: #00000038; border: 1px solid var(--line); border-radius: 8px; padding: 12px; text-align: center; }
    .m span { display: block; color: var(--muted); font-size: 12px; }
    .m b { display: block; font-size: 28px; line-height: 1.12; }
    .stage { padding: 16px; display: grid; place-items: center; gap: 16px; }
    .boardWrap { display: grid; justify-items: center; gap: 16px; width: 100%; }
    .board {
      display: grid;
      gap: 2px;
      padding: 10px;
      background: #e8d8b4;
      border-radius: 8px;
      box-shadow: inset 0 0 0 2px rgba(64, 45, 18, .22);
    }
    .cell { width: var(--cell, 28px); height: var(--cell, 28px); border-radius: 3px; }
    .cell.on { background: #15120e; box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .16); }
    .cell.off { background: transparent; }
    .pieces { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .pieceCard { background: #f0e5c9; color: #171410; border-radius: 8px; padding: 7px; display: grid; gap: 6px; justify-items: center; }
    .pieceNo { font-size: 12px; font-weight: 950; color: #5f4320; }
    .piece { display: grid; gap: 2px; }
    .pCell { width: 14px; height: 14px; border-radius: 2px; }
    .pCell.on { background: #4e3420; }
    .pCell.off { background: transparent; }
    .msg { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #00000038; padding: 12px; color: var(--muted); line-height: 1.5; }
    .backend { font-size: 12px; line-height: 1.45; color: var(--muted); word-break: break-all; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; background: #777; }
    .dot.ok { background: var(--ok); }
    .dot.bad { background: var(--bad); }
    .team { border: 1px solid var(--line); border-left: 6px solid var(--team); border-radius: 8px; background: #00000038; padding: 12px; }
    .team h3 { margin: 0 0 8px; font-size: 18px; }
    .teamScore { font-size: 52px; line-height: 1; font-weight: 950; margin-bottom: 10px; }
    .resultLine { min-height: 26px; color: var(--muted); font-size: 13px; }
    .pill { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 4px 9px; color: var(--gold); font-weight: 800; }
    .answer {
      display: grid;
      gap: 2px;
      padding: 10px;
      background: #e8d8b4;
      border: 1px solid rgba(64, 45, 18, .28);
      border-radius: 8px;
    }
    .aCell {
      width: var(--answer-cell, 28px);
      height: var(--answer-cell, 28px);
      border-radius: 3px;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 950;
      background: #15120e;
      color: transparent;
    }
    .aCell.placed { background: #f8f2e5; color: #15120e; border: 1px solid #15120e; }
    .aCell.off { background: transparent; border: 0; }
    @media (max-width: 1120px) { .app { grid-template-columns: 1fr; } .metric { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
<main class="app">
  <header class="top">
    <div>
      <h1>挑战拼图 控制台</h1>
      <div class="sub">简化赛制：两队同时看题、同时拼图；倒计时结束后录入各自完成的最高 Step，Step 高者赢。</div>
    </div>
    <div class="topActions">
      <button class="primary" id="open">打开 iPad 同步页</button>
      <div class="backend" id="backendTop"><span class="dot"></span>同步后端检测中</div>
    </div>
  </header>

  <aside class="panel">
    <section class="sec stack">
      <h2>题目设置</h2>
      <p><label>题目</label><select id="puzzle"></select></p>
      <p><label>统一答题时间（秒）</label><input id="seconds" type="number" min="30" max="600" value="180"></p>
      <button class="primary" id="start">开始同时答题</button>
      <div class="g2">
        <button id="finish">提前结束</button>
        <button class="bad" id="reset">重置</button>
      </div>
      <div class="msg">现场用实物板和拼图块作答；本页面只负责题面、倒计时、结果同步和主持人判定。</div>
    </section>
    <section class="sec">
      <h2>流程</h2>
      <div class="hint">1. 选择题目并开始。<br>2. 两名选手同时拼图。<br>3. 时间到，主持人录入清华/北大的最高 Step。<br>4. 系统比较 Step 并给本题计分。</div>
    </section>
    <section class="sec stack">
      <h2>同步后端</h2>
      <p><label>后端地址</label><input id="backendUrl" placeholder="例如 https://sync.example.com"></p>
      <div class="g2">
        <button id="backendSave">保存并重载</button>
        <button id="backendClear">清除</button>
      </div>
      <div class="msg" id="backendState">读取中</div>
    </section>
  </aside>

  <section class="panel">
    <div class="metric">
      <div class="m"><span>阶段</span><b id="phase">待开始</b></div>
      <div class="m"><span>题号</span><b id="round">0</b></div>
      <div class="m"><span>倒计时</span><b id="clock">--:--</b></div>
      <div class="m"><span>本题结果</span><b id="winner">--</b></div>
    </div>
    <div class="stage">
      <div class="boardWrap">
        <div class="board" id="board"></div>
        <div class="pieces" id="pieces"></div>
        <div class="answer" id="answer"></div>
      </div>
      <div class="msg" id="message">打开主持人控制台，开始比赛。</div>
    </div>
  </section>

  <aside class="panel">
    <section class="sec"><h2>成绩录入</h2>
      <div class="stack">
        <div class="team" style="--team:var(--thu)">
          <h3>清华</h3>
          <div class="teamScore" id="thuScore">0</div>
          <label>完成最高 Step</label>
          <div class="g2"><input id="thuStep" type="number" min="0" max="12" value="0"><button id="thuSave">录入</button></div>
          <div class="resultLine" id="thuResult">未录入</div>
        </div>
        <div class="team" style="--team:var(--pku)">
          <h3>北大</h3>
          <div class="teamScore" id="pkuScore">0</div>
          <label>完成最高 Step</label>
          <div class="g2"><input id="pkuStep" type="number" min="0" max="12" value="0"><button id="pkuSave">录入</button></div>
          <div class="resultLine" id="pkuResult">未录入</div>
        </div>
        <button id="next">下一题</button>
      </div>
    </section>
  </aside>
</main>

<script src="core.js"></script>
<script src="../sync.js"></script>
<script>
(() => {
  const ROOM = 'challenge-puzzle';
  const STORAGE = 'challenge-puzzle:v1:state';
  const CHANNEL = 'challenge-puzzle-v1';
  const C = window.ChallengePuzzle;
  const $ = id => document.getElementById(id);
  const E = {
    open: $('open'), puzzle: $('puzzle'), seconds: $('seconds'), start: $('start'), finish: $('finish'), reset: $('reset'),
    phase: $('phase'), round: $('round'), clock: $('clock'), winner: $('winner'), board: $('board'), pieces: $('pieces'),
    message: $('message'), thuScore: $('thuScore'), pkuScore: $('pkuScore'), thuStep: $('thuStep'), pkuStep: $('pkuStep'),
    thuSave: $('thuSave'), pkuSave: $('pkuSave'), thuResult: $('thuResult'), pkuResult: $('pkuResult'), next: $('next'),
    answer: $('answer'), backendTop: $('backendTop'), backendUrl: $('backendUrl'), backendSave: $('backendSave'),
    backendClear: $('backendClear'), backendState: $('backendState')
  };
  const bc = 'BroadcastChannel' in window ? new BroadcastChannel(CHANNEL) : null;
  let sync = null;
  let state = load() || C.freshState();

  C.PUZZLES.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = `${i + 1}. ${p.title}（上限 Step ${p.maxStep}）`;
    E.puzzle.appendChild(opt);
  });

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE)); } catch (_) { return null; }
  }

  function publish() {
    localStorage.setItem(STORAGE, JSON.stringify(state));
    if (bc) bc.postMessage(state);
    if (sync) sync.pushState(state);
    render();
  }

  function timeLeft() {
    if (state.phase !== 'solving') return 0;
    return Math.max(0, state.endsAt - Date.now());
  }

  function fmt(ms) {
    const total = Math.ceil(ms / 1000);
    const m = Math.floor(total / 60);
    const s = total % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function phaseLabel() {
    return { idle: '待开始', solving: '同时作答', scoring: '录入成绩', judged: '已判定' }[state.phase] || '待开始';
  }

  function winnerLabel() {
    if (state.winner === 'thu') return '清华';
    if (state.winner === 'pku') return '北大';
    if (state.winner === 'draw') return '平局';
    return '--';
  }

  function selectedPuzzle() {
    return C.PUZZLES[Number(E.puzzle.value) || 0];
  }

  function drawShape(el, rows, cellClass, activeClass) {
    const cols = Math.max(...rows.map(r => r.length));
    el.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    rows.forEach(row => {
      for (let i = 0; i < cols; i += 1) {
        const d = document.createElement('div');
        d.className = `${cellClass} ${row[i] === '#' ? activeClass : 'off'}`;
        el.appendChild(d);
      }
    });
  }

  function drawPuzzle() {
    E.board.innerHTML = '';
    E.pieces.innerHTML = '';
    E.answer.innerHTML = '';
    const puzzle = state.puzzle || selectedPuzzle();
    if (!puzzle) return;
    const rows = puzzle.board;
    const cols = Math.max(...rows.map(r => r.length));
    E.board.style.gridTemplateColumns = `repeat(${cols}, var(--cell))`;
    E.board.style.setProperty('--cell', `${Math.max(18, Math.min(32, Math.floor(360 / cols)))}px`);
    drawShape(E.board, rows, 'cell', 'on');
    puzzle.pieces.forEach((piece, i) => {
      const card = document.createElement('div');
      card.className = 'pieceCard';
      const no = document.createElement('div');
      no.className = 'pieceNo';
      no.textContent = String(i + 1);
      const grid = document.createElement('div');
      grid.className = 'piece';
      drawShape(grid, piece, 'pCell', 'on');
      card.append(no, grid);
      E.pieces.appendChild(card);
    });

    const answer = C.answerGrid(puzzle, puzzle.maxStep);
    if (answer) {
      E.answer.style.gridTemplateColumns = `repeat(${cols}, var(--answer-cell))`;
      E.answer.style.setProperty('--answer-cell', `${Math.max(18, Math.min(30, Math.floor(330 / cols)))}px`);
      answer.forEach((row, y) => {
        for (let x = 0; x < cols; x += 1) {
          const source = rows[y] && rows[y][x] === '#';
          const mark = row[x];
          const d = document.createElement('div');
          d.className = `aCell ${source ? (mark && mark !== '·' ? 'placed' : '') : 'off'}`;
          d.textContent = mark && mark !== '·' ? mark : '';
          E.answer.appendChild(d);
        }
      });
    }
  }

  function render() {
    E.phase.textContent = phaseLabel();
    E.round.textContent = state.round;
    E.clock.textContent = state.phase === 'solving' ? fmt(timeLeft()) : '--:--';
    E.winner.textContent = winnerLabel();
    E.message.textContent = state.message || '';
    E.thuScore.textContent = state.scores.thu;
    E.pkuScore.textContent = state.scores.pku;
    E.thuResult.innerHTML = state.results.thu === null ? '未录入' : `<span class="pill">Step ${state.results.thu}</span>`;
    E.pkuResult.innerHTML = state.results.pku === null ? '未录入' : `<span class="pill">Step ${state.results.pku}</span>`;
    E.finish.disabled = state.phase !== 'solving';
    E.thuSave.disabled = E.pkuSave.disabled = state.phase !== 'scoring';
    E.next.disabled = state.phase !== 'judged';
    E.start.disabled = state.phase === 'solving';
    drawPuzzle();
  }

  async function renderBackendStatus() {
    const backend = window.Sync ? Sync.BACKEND : '';
    E.backendUrl.value = backend || '';
    if (!backend) {
      E.backendTop.innerHTML = '<span class="dot bad"></span>未配置同步后端';
      E.backendState.textContent = '当前页面没有后端地址。用 ?backend=https://你的 Cloudflare Tunnel 地址 打开一次，或在这里保存地址后重载。';
      return;
    }
    E.backendTop.innerHTML = `<span class="dot"></span>${backend}`;
    E.backendState.textContent = `正在访问 ${backend}/healthz`;
    const ok = await Sync.reachable();
    E.backendTop.innerHTML = `<span class="dot ${ok ? 'ok' : 'bad'}"></span>${ok ? '后端在线' : '后端不可达'}：${backend}`;
    E.backendState.textContent = ok
      ? `已连通 ${backend}/healthz，iPad 用同一后端地址即可同步。`
      : `无法连通 ${backend}/healthz。请核对 VPS 服务、Cloudflare Tunnel 域名和 HTTPS 证书。`;
  }

  function maybeAutoFinish() {
    if (state.phase === 'solving' && timeLeft() <= 0) {
      C.finishSolving(state);
      publish();
    } else {
      render();
    }
  }

  E.open.onclick = () => {
    const backend = window.Sync && Sync.BACKEND ? `?backend=${encodeURIComponent(Sync.BACKEND)}` : '';
    window.open(`index.html${backend}`, 'challenge_puzzle_display');
  };
  E.puzzle.onchange = () => { if (!state.puzzle) render(); };
  E.backendSave.onclick = () => {
    const value = E.backendUrl.value.trim().replace(/\/+$/, '');
    if (value) localStorage.setItem('sync_backend', value);
    location.reload();
  };
  E.backendClear.onclick = () => {
    localStorage.removeItem('sync_backend');
    location.reload();
  };
  E.start.onclick = () => {
    const puzzle = C.PUZZLES[Number(E.puzzle.value) || 0];
    const duration = Math.max(30, Math.min(600, Number(E.seconds.value) || 180)) * 1000;
    C.startRound(state, puzzle, duration);
    publish();
  };
  E.finish.onclick = () => { if (C.finishSolving(state)) publish(); };
  E.reset.onclick = () => { state = C.freshState(); publish(); };
  E.next.onclick = () => {
    const nextIndex = state.puzzle ? (C.PUZZLES.findIndex(p => p.id === state.puzzle.id) + 1) % C.PUZZLES.length : 0;
    E.puzzle.value = String(nextIndex);
    E.start.click();
  };
  E.thuSave.onclick = () => { if (C.recordResult(state, 'thu', E.thuStep.value)) publish(); };
  E.pkuSave.onclick = () => { if (C.recordResult(state, 'pku', E.pkuStep.value)) publish(); };

  setInterval(maybeAutoFinish, 250);
  render();
  renderBackendStatus();

  (async () => {
    if (!window.Sync || !Sync.BACKEND) return;
    sync = Sync.console(ROOM);
    let res = await sync.claim(false);
    if (res && !res.ok && confirm('已有一个控制台在线，是否强制接管？')) res = await sync.claim(true);
    if (res && res.ok) publish();
  })();
})();
</script>
</body>
</html>
