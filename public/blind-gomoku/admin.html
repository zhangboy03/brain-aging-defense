<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>盲五子棋 · 主持人控制台</title>
<style>
  :root {
    --grid-line: rgba(86, 168, 255, .45);
    --board-bg: #0a1430;
    --ink: #e8e4da;
    --dim: #8d8678;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    color: var(--ink); background: #0d0b08; overflow: hidden;
    display: flex; flex-direction: column;
  }
  #banner {
    background: #b3261e; color: #fff; text-align: center;
    padding: 7px; font-size: 14px; font-weight: 600; display: none;
  }
  #takeover {
    background: #7a5b00; color: #fff; text-align: center;
    padding: 7px; font-size: 14px; font-weight: 600; display: none;
  }
  #takeover button { margin-left: 12px; }
  main { flex: 1; display: flex; gap: 16px; padding: 16px; min-height: 0; }

  #board-wrap {
    height: 100%; aspect-ratio: 1; background: var(--board-bg);
    border: 2px solid rgba(86, 168, 255, .6); border-radius: 8px;
    box-shadow: 0 0 26px rgba(64, 140, 255, .3); padding: 10px;
  }
  #board { display: grid; grid-template-columns: repeat(15, 1fr); width: 100%; height: 100%; }
  .cell { position: relative; border: 1px solid var(--grid-line); }
  .stone {
    position: absolute; inset: 9%; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.6);
  }
  .stone .true {  /* 内圈真实黑白 */
    width: 58%; height: 58%; border-radius: 50%;
    box-shadow: inset -1px -2px 3px rgba(0,0,0,.4), inset 1px 2px 3px rgba(255,255,255,.3);
  }
  .num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: clamp(7px, 1.4vmin, 12px); font-weight: 700; pointer-events: none;
    text-shadow: 0 0 3px #000, 0 0 2px #000; color: #fff;
  }
  .cell.win::after { content: ''; position: absolute; inset: 2%; border: 2px solid #ffd750; border-radius: 50%; }
  .cell.last::after { content: ''; position: absolute; inset: 2%; border: 2px dashed rgba(255,255,255,.6); border-radius: 50%; }

  #side { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 280px; }
  .panel { background: rgba(18, 15, 11, .85); border: 1px solid #3c362b; border-radius: 12px; padding: 14px; }
  h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: .12em; }
  #status-line { color: var(--dim); font-size: 13px; }
  .seat { display: inline-flex; align-items: center; gap: 6px; margin-right: 16px; font-size: 14px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
  .dot.on { background: #3fae5a; box-shadow: 0 0 6px #3fae5a; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; }
  button.act {
    padding: 10px 18px; border-radius: 10px; border: 1px solid #4a4438;
    background: linear-gradient(180deg, #262219, #17140e); color: var(--ink);
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button.act:disabled { opacity: .35; cursor: default; }
  button.act.primary { border-color: #7a6a2f; color: #ffd750; }
  button.act.danger { border-color: #7a3a34; color: #ef8d84; }
  label.toggle { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--dim); }
  #log { flex: 1; overflow-y: auto; font-size: 13px; line-height: 1.8; font-variant-numeric: tabular-nums; }
  #log .entry b { color: #ffd750; font-weight: 600; }
  #verdict { font-size: 16px; font-weight: 700; color: #ffd750; min-height: 22px; }
</style>
</head>
<body>
<div id="banner">⚠️ 连接断开 / 推送失败，正在自动重试…</div>
<div id="takeover">已被另一控制台接管，本台只读<button class="act" onclick="retakeover()">重新接管</button></div>
<main>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="side">
    <div class="panel">
      <h1>盲五子棋 · 主持人控制台</h1>
      <div id="status-line">上帝视角：外环 = 选手看到的表面色，内圈 = 真实黑白</div>
    </div>
    <div class="panel">
      <div style="margin-bottom:10px">
        <span class="seat"><span class="dot" id="dot-tsinghua"></span>清华</span>
        <span class="seat"><span class="dot" id="dot-pku"></span>北大</span>
        <span class="seat" id="seat-info" style="color:var(--dim)"></span>
      </div>
      <div class="btn-row">
        <button class="act primary" id="btn-start" onclick="startGameClick()">开始新一局</button>
        <button class="act danger" id="btn-end" onclick="forceEndClick()">强制结束并揭示</button>
        <button class="act" id="btn-reset" onclick="resetClick()">重置回大厅</button>
        <label class="toggle"><input type="checkbox" id="chk-num" onchange="toggleNumbers(this.checked)">给选手显示序号</label>
      </div>
      <div id="verdict" style="margin-top:10px"></div>
    </div>
    <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div style="color:var(--dim);font-size:13px;margin-bottom:6px">着法记录</div>
      <div id="log"></div>
    </div>
  </div>
</main>

<script src="../sync.js"></script>
<script src="core.js"></script>
<script>
'use strict';
const G = window.BlindGomoku;
const ROOM = 'blind-gomoku';
const BACKEND = Sync.BACKEND;
const SWATCH = { red:'#e23b3b', yellow:'#f2c11d', blue:'#2f7fe8', green:'#2faf5e',
                 pink:'#ef7fb3', purple:'#8e5bd6', white:'#f2f2f2', black:'#1b1b1b' };
const TEAM_NAME = { tsinghua:'清华', pku:'北大' };
const COLOR_NAME = { red:'红', yellow:'黄', blue:'蓝', green:'绿', pink:'粉', purple:'紫', white:'白', black:'黑' };
const COLS = 'ABCDEFGHIJKLMNO';

let auth = null;              // 权威 state（本控制台为引擎时非 null）
let readOnly = false;
let token = null;
let hbTimer = null;
let lastMsgAt = Date.now();
let es = null;
const sync = Sync.console(ROOM);

function setBanner(on) { document.getElementById('banner').style.display = on ? 'block' : 'none'; }

async function post(path, body) {
  return fetch(BACKEND + '/r/' + ROOM + '/' + path, {
    method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body),
  }).then(r => r.json());
}

async function boot() {
  // 锁：claim，busy 自动 force 一次（spec §7，覆盖刷新后 10s 旧锁窗口）。
  // relay 瞬时不可达不能让 boot 中断：失败亮红横幅，3s 后整体重试。
  try {
    let r = await post('claim', {});
    if (!r.ok) r = await post('claim', { force: true });
    token = r.token;
  } catch (_) { setBanner(true); setTimeout(boot, 3000); return; }
  setBanner(false);
  if (!hbTimer) hbTimer = setInterval(heartbeat, 4000);  // 自管心跳：检查响应
  // 恢复：有快照 → 沿用其 epoch 续 v；无快照 → 新 epoch（spec §5）
  const snap = await fetch(BACKEND + '/r/' + ROOM + '/snapshot').then(r => r.json()).catch(() => null);
  auth = (snap && typeof snap.epoch === 'number') ? snap : G.initialState(Date.now());
  connect();
  pushAuth();                            // 上线即广播一次当前真相
  render();
}

async function heartbeat() {
  if (readOnly) return;
  try {
    const r = await post('heartbeat', { token });
    if (!r.ok) {
      // 区分两种 ok:false：relay 重启锁蒸发（无 force 的 claim 能成功）→ 换 token
      // 继续当引擎并重推快照；锁被另一控制台持有（busy）→ 真被接管，转只读。
      const c = await post('claim', {});
      if (c.ok) { token = c.token; pushAuth(); }
      else enterReadOnly();
    }
    setBanner(false);
  } catch (_) { setBanner(true); /* 网络错不算失锁 */ }
}
function enterReadOnly() { readOnly = true; render(); }
async function retakeover() {
  try {
    const r = await post('claim', { force: true });
    token = r.token;
    const snap = await fetch(BACKEND + '/r/' + ROOM + '/snapshot').then(r => r.json()).catch(() => null);
    if (snap && G.isNewer(auth, snap)) auth = snap;   // 接管前对齐对方可能推过的进度
    readOnly = false; pushAuth(); render();
  } catch (_) { setBanner(true); }
}

// 单飞串行 sender（spec §3 自愈 2）：永远发当前最新权威 state，绝不重试旧 payload
let sending = false, dirty = false;
async function pushAuth() {
  if (readOnly) return;
  if (sending) { dirty = true; return; }
  sending = true;
  try {
    const res = await sync.pushState(auth);
    if (!res || res.ok !== true) throw new Error('relay rejected');  // 4xx/5xx 的 JSON 不当成功
    setBanner(false);
  } catch (_) {
    dirty = true; setBanner(true);
    setTimeout(() => { sending = false; if (dirty) { dirty = false; pushAuth(); } }, 1000);
    return;
  }
  sending = false;
  if (dirty) { dirty = false; pushAuth(); }
}

function connect() {
  if (es) es.close();
  es = Sync.display(ROOM, () => { lastMsgAt = Date.now(); }, onEvent);  // 忽略 state 回显（spec §3）
  es.onopen = () => { lastMsgAt = Date.now(); setBanner(false); if (!readOnly && auth) pushAuth(); };  // 重连重推
  es.onerror = () => setBanner(true);
}
setInterval(() => {                      // 控制台同样需要僵尸看门狗
  if (Date.now() - lastMsgAt > 90000) { lastMsgAt = Date.now(); connect(); }
}, 5000);

function onEvent(e) {
  lastMsgAt = Date.now();
  if (readOnly || !auth || !e) return;
  let changed = false;
  if (e.type === 'join') changed = G.applyJoin(auth, e.team, e.deviceId);
  else if (e.type === 'move') {
    changed = G.applyMove(auth, e);
    if (changed) logMove(e);
  }
  if (changed) { pushAuth(); render(); }
}

// ---- 控制台动作 ----
function startGameClick() {
  if (readOnly || !auth) return;
  if (G.startGame(auth, Math.random)) {
    document.getElementById('log').innerHTML = '';
    pushAuth(); render();
  }
}
function resetClick() {
  if (readOnly || !auth) return;
  if (confirm('重置将清空棋盘和就位状态，确定？') && G.resetLobby(auth)) { pushAuth(); render(); }
}
function forceEndClick() {
  if (readOnly || !auth) return;
  if (confirm('强制结束并揭示全盘？') && G.forceEnd(auth)) { pushAuth(); render(); }
}
function toggleNumbers(on) {
  if (readOnly || !auth) return;
  auth.showNumbers = on; auth.v++; pushAuth(); render();
}

// ---- 渲染 ----
const boardEl = document.getElementById('board');
const cells = [];
for (let y = 0; y < G.SIZE; y++) {
  for (let x = 0; x < G.SIZE; x++) {
    const d = document.createElement('div');
    d.className = 'cell';
    boardEl.appendChild(d);
    cells.push({ x, y, el: d });
  }
}

function logMove(e) {
  const stone = auth.seats[e.team];
  const cellRef = COLS[e.x] + (e.y + 1);
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `<b>第${auth.moveCount}手</b> ${TEAM_NAME[e.team]}(${stone === 'b' ? '黑' : '白'}) ${cellRef} 表面${COLOR_NAME[e.color] || e.color}`;
  const log = document.getElementById('log');
  log.prepend(div);
}

function render() {
  document.getElementById('takeover').style.display = readOnly ? 'block' : 'none';
  if (!auth) return;
  for (const t of G.TEAMS) {
    document.getElementById('dot-' + t).classList.toggle('on', !!auth.joined[t]);
  }
  const seatInfo = document.getElementById('seat-info');
  if (auth.phase !== 'lobby' && auth.seats.tsinghua) {
    seatInfo.textContent = `清华执${auth.seats.tsinghua === 'b' ? '黑' : '白'} / 北大执${auth.seats.pku === 'b' ? '黑' : '白'}（第 ${auth.gameId} 局）`;
  } else seatInfo.textContent = '';

  document.getElementById('btn-start').disabled =
    readOnly || !(auth.joined.tsinghua && auth.joined.pku) || auth.phase === 'playing';
  document.getElementById('btn-end').disabled = readOnly || auth.phase !== 'playing';
  document.getElementById('btn-reset').disabled = readOnly;
  document.getElementById('chk-num').checked = !!auth.showNumbers;

  const verdict = document.getElementById('verdict');
  if (auth.phase === 'finished') {
    if (auth.winner === 'draw') verdict.textContent = '平局（棋盘下满）';
    else if (auth.winner) {
      const team = G.TEAMS.find(t => auth.seats[t] === auth.winner);
      verdict.textContent = `${TEAM_NAME[team]}（${auth.winner === 'b' ? '黑' : '白'}）连五获胜！`;
    } else verdict.textContent = '已强制结束（无胜者）';
  } else if (auth.phase === 'playing') {
    const team = G.TEAMS.find(t => auth.seats[t] === auth.turn);
    verdict.textContent = `第 ${auth.moveCount + 1} 手，轮到 ${TEAM_NAME[team]}（${auth.turn === 'b' ? '黑' : '白'}）`;
  } else verdict.textContent = '';

  for (const { x, y, el } of cells) {
    const cell = auth.board[x][y];
    el.className = 'cell';
    el.innerHTML = '';
    if (cell) {
      const st = document.createElement('div');
      st.className = 'stone';
      st.style.background = SWATCH[cell.c];           // 外环：表面色
      const tr = document.createElement('div');
      tr.className = 'true';                          // 内圈：真实黑白
      tr.style.background = cell.s === 'b'
        ? 'radial-gradient(circle at 32% 28%, #4a4a4a, #0b0b0b)'
        : 'radial-gradient(circle at 32% 28%, #ffffff, #cfcfcf)';
      st.appendChild(tr);
      el.appendChild(st);
      const n = document.createElement('div');
      n.className = 'num'; n.textContent = cell.n;
      el.appendChild(n);
      if (auth.lastMove && auth.lastMove.x === x && auth.lastMove.y === y) el.classList.add('last');
      if (auth.winLine && auth.winLine.some(p => p[0] === x && p[1] === y)) el.classList.add('win');
    }
  }
}
boot();
</script>
</body>
</html>
