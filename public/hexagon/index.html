<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>HEXAGON｜投屏页</title>
  <style>
    :root{
      --bg:#030304;
      --bg2:#0b0707;
      --ivory:#eee7d7;
      --ivory2:#c9bea3;
      --ink:#090909;
      --char:#f7f2e8;
      --blackCell:#060607;
      --blackCell2:#141316;
      --gold:#c7a45a;
      --red:#8f1627;
      --line:rgba(220,196,139,.28);
      --muted:rgba(247,242,232,.58);
      --hex:min(15.2vmin,128px);
      --gap:clamp(5px,.72vmin,9px);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--char);font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:
      radial-gradient(circle at 50% 44%,rgba(147,22,39,.18),transparent 34%),
      radial-gradient(circle at 51% 47%,rgba(224,181,93,.08),transparent 46%),
      linear-gradient(180deg,#090708 0%,#030304 58%,#050202 100%)}
    body:after{content:"";position:fixed;inset:-20%;pointer-events:none;opacity:.18;background-image:url("data:image/svg+xml,%3Csvg width='90' height='78' viewBox='0 0 90 78' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M22.5 1 45 14v26L22.5 53 0 40V14L22.5 1Zm45 0L90 14v26L67.5 53 45 40V14L67.5 1Z' fill='none' stroke='%23b69a5c' stroke-opacity='.45'/%3E%3C/svg%3E");filter:blur(.2px)}
    .screen{position:relative;z-index:1;width:100vw;height:100vh;display:grid;grid-template-rows:minmax(72px,12vh) 1fr minmax(72px,12vh);padding:4.5vh 5vw}
    .hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700}
    .hud .left{justify-self:start}.hud .center{justify-self:center}.hud .right{justify-self:end;text-align:right}.label{font-size:clamp(12px,1.45vmin,18px);display:block}.value{font-size:clamp(28px,5.6vmin,72px);line-height:1;color:var(--char);letter-spacing:.04em;text-shadow:0 0 24px rgba(199,164,90,.18)}
    .target .value{color:#f4d38a}.stageTag{font-size:clamp(16px,2.1vmin,26px);padding:.55em 1em;border:1px solid var(--line);border-radius:999px;background:rgba(0,0,0,.34);box-shadow:0 0 38px rgba(0,0,0,.45)}
    .boardWrap{display:grid;place-items:center;min-height:0}.board{display:grid;gap:calc(var(--gap)*.65);filter:drop-shadow(0 34px 60px rgba(0,0,0,.62))}.row{display:flex;justify-content:center;gap:var(--gap);height:calc(var(--hex)*.865);margin-top:calc(var(--hex)*-.03)}.row:first-child{margin-top:0}
    .hex{width:var(--hex);height:calc(var(--hex)*.866);clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);display:grid;place-items:center;position:relative;font-family:"Arial Narrow","DIN Condensed",Impact,"PingFang SC",sans-serif;font-weight:900;font-size:calc(var(--hex)*.52);letter-spacing:.015em;transition:background .36s ease,color .36s ease,transform .28s ease,opacity .28s ease,filter .28s ease;text-shadow:none;isolation:isolate}.hex:before{content:"";position:absolute;inset:3px;clip-path:inherit;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.34),inset 0 -18px 30px rgba(0,0,0,.16);z-index:-1}.hex.digit{background:linear-gradient(150deg,var(--ivory) 0%,#f8f3e8 42%,var(--ivory2) 100%);color:var(--ink)}.hex.letter{background:linear-gradient(145deg,var(--blackCell2),var(--blackCell));color:var(--char);text-shadow:0 0 18px rgba(255,255,255,.16)}.hex.letter:before{box-shadow:inset 0 0 0 1px rgba(226,203,146,.34),inset 0 0 24px rgba(0,0,0,.72)}.hex.blank{opacity:.16;color:transparent}.hex.letter.used{filter:drop-shadow(0 0 18px rgba(199,164,90,.55));color:#f6d992}.hex.digit.revealed{filter:drop-shadow(0 0 22px rgba(244,211,138,.45))}.hex.pulse{animation:pulse .72s ease}.hex.revealed{animation:flip .42s ease}
    @keyframes pulse{0%{transform:scale(1)}45%{transform:scale(1.045)}100%{transform:scale(1)}}@keyframes flip{0%{transform:rotateY(70deg) scale(.96);opacity:.55}100%{transform:rotateY(0) scale(1);opacity:1}}
    .footer{display:grid;place-items:center;text-align:center}.message{max-width:84vw;color:rgba(247,242,232,.72);font-size:clamp(16px,2.25vmin,29px);letter-spacing:.04em}.message strong{color:#f1d18b;font-weight:900}.winner{font-size:clamp(36px,7vmin,96px);letter-spacing:.08em;color:#f4d38a;text-shadow:0 0 34px rgba(199,164,90,.26)}
    .launcher{position:fixed;z-index:5;right:22px;bottom:20px;display:flex;gap:10px;opacity:.36;transition:opacity .2s}.launcher:hover{opacity:1}.launcher button,.launcher a{border:1px solid rgba(247,242,232,.2);background:rgba(0,0,0,.45);color:var(--char);border-radius:999px;padding:10px 13px;text-decoration:none;font-size:13px;letter-spacing:.04em;cursor:pointer}.launcher a{display:inline-flex;align-items:center}
    :fullscreen .launcher{display:none}body.clean .hud .left,body.clean .hud .right{opacity:.9}body.clean .message{opacity:.76}.answering .board{transform:scale(.96)}.responding .stageTag{border-color:rgba(199,164,90,.65);color:#f4d38a}.finished .boardWrap{opacity:.28;filter:blur(1px)}.finished .message{display:none}.finished .footer:before{content:attr(data-winner);font-family:"Arial Narrow",Impact,sans-serif;font-size:clamp(40px,7vmin,104px);font-weight:900;letter-spacing:.1em;color:#f4d38a;text-shadow:0 0 42px rgba(199,164,90,.28)}
    @media(max-aspect-ratio:1/1){:root{--hex:min(17vw,112px)}.screen{padding:3vh 4vw}.hud{grid-template-columns:1fr;gap:8px;text-align:center}.hud .left,.hud .right,.hud .center{justify-self:center}.hud .right{text-align:center}.stageTag{display:none}}
  </style>
</head>
<body class="clean idle">
  <main class="screen" id="screen">
    <header class="hud">
      <div class="left"><span class="label">ROUND</span><span class="value" id="round">0/10</span></div>
      <div class="center"><span class="stageTag" id="stage">WAITING</span></div>
      <div class="right target"><span class="label" id="targetLabel">TARGET</span><span class="value" id="target">—</span></div>
    </header>
    <section class="boardWrap"><div class="board" id="board" aria-label="Hexagon board"></div></section>
    <footer class="footer" id="footer"><div class="message" id="message">打开主持人控制台，开始比赛。</div></footer>
  </main>
  <div class="launcher">
    <a href="admin.html" target="_blank">主持人控制台</a>
    <button id="full">全屏</button>
  </div>
  <script>
    (()=>{
      const STORAGE='hexagon:v2:state', CHANNEL='hexagon-v2';
      const rows=[['A','B','C'],['D','E','F','G'],['H','I','J','K','L'],['M','N','O','P'],['Q','R','S']];
      const $=id=>document.getElementById(id);
      const board=$('board'), round=$('round'), stage=$('stage'), target=$('target'), targetLabel=$('targetLabel'), msg=$('message'), footer=$('footer');
      let lastFlash=0;
      function empty(){return{phase:'idle',round:0,total:10,timer:null,target:null,numbers:{},used:[],team:null,message:'打开主持人控制台，开始比赛。',scores:{thu:0,pku:0},teams:{thu:'清华',pku:'北大'},winner:'',clean:true,flashAt:0}}
      function load(){try{return JSON.parse(localStorage.getItem(STORAGE))||empty()}catch{return empty()}}
      function phaseName(p){return{idle:'WAITING',memorize:'MEMORIZE',answering:'TARGET',responding:'BUZZED',between:'ROUND END',finished:'FINISHED'}[p]||'WAITING'}
      function usedLetters(s){const set=new Set();(s.used||[]).forEach(k=>[...k].forEach(x=>set.add(x)));return set}
      function render(s=load()){
        document.body.className=(s.clean!==false?'clean ':'')+(s.phase||'idle');
        round.textContent=(s.round||0)+'/'+(s.total||10);
        stage.textContent=phaseName(s.phase)+(Number.isFinite(s.timer)?' · '+s.timer:'');
        const showTarget=s.phase&&s.phase!=='idle'&&s.phase!=='memorize'&&s.target!=null;
        target.textContent=showTarget?s.target:'';
        targetLabel.textContent=showTarget?'TARGET':'';
        const u=usedLetters(s);
        board.innerHTML='';
        rows.forEach(row=>{const r=document.createElement('div');r.className='row';row.forEach(L=>{const c=document.createElement('div');const has=s.numbers&&s.numbers[L]!=null;const isMemory=s.phase==='memorize';const isRevealed=!isMemory&&u.has(L);const showNumber=isMemory||isRevealed;c.className='hex '+(has?(showNumber?'digit':'letter'):'blank')+(isRevealed?' revealed':'')+(!isRevealed&&u.has(L)?' used':'');c.textContent=has?(showNumber?s.numbers[L]:L):'';if((s.flashAt||0)>lastFlash)c.classList.add('pulse');r.appendChild(c)});board.appendChild(r)});
        if((s.flashAt||0)>lastFlash){lastFlash=s.flashAt;setTimeout(()=>document.querySelectorAll('.pulse').forEach(x=>x.classList.remove('pulse')),760)}
        msg.innerHTML=s.showHint ? (s.message||'') : '';
        const winner=s.winner||'';footer.setAttribute('data-winner',winner);
      }
      window.addEventListener('storage',e=>{if(e.key===STORAGE)render(load())});
      if('BroadcastChannel' in window){const bc=new BroadcastChannel(CHANNEL);bc.onmessage=e=>render(e.data||load())}
      $('full').onclick=()=>{if(document.fullscreenElement)document.exitFullscreen();else document.documentElement.requestFullscreen?.()};
      document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='f')$('full').click()});
      render();
    })();
  </script>
</body>
</html>
