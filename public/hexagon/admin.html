<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HEXAGON 控制台</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#5038b633,transparent 28%),radial-gradient(circle at 80% 0,#9d142733,transparent 30%),#070708;color:#f3eee5;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}button,input{font:inherit}button{border:1px solid #efe2c71f;border-radius:13px;background:#ffffff10;color:#f3eee5;padding:10px 12px;cursor:pointer}button:disabled{opacity:.38;cursor:not-allowed}.primary{background:linear-gradient(#e6cf85,#a77d31);color:#120d03;font-weight:900}.bad{background:#95192b88}.app{display:grid;grid-template-columns:300px 1fr 340px;gap:14px;padding:14px}.top,.panel{background:#111114df;border:1px solid #efe2c71c;border-radius:22px;box-shadow:0 24px 70px #0008}.top{grid-column:1/-1;display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px}h1{margin:0;font-size:28px;letter-spacing:.08em}h2{margin:0 0 11px;font-size:17px}.sub,.hint{color:#f3eee59a;font-size:13px;line-height:1.5}.sec{padding:15px;border-bottom:1px solid #efe2c714}.sec:last-child{border-bottom:0}.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stack{display:grid;gap:8px}label{display:block;color:#f3eee59a;font-size:12px;margin:0 0 5px}input{width:100%;border:1px solid #efe2c71c;border-radius:13px;background:#0005;color:#fff;min-height:40px;padding:8px 10px}.metric{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:15px;border-bottom:1px solid #efe2c714}.m{background:#0004;border:1px solid #efe2c714;border-radius:16px;padding:11px;text-align:center}.m span{display:block;color:#f3eee59a;font-size:12px}.m b{display:block;font-size:34px;line-height:1}.target b{color:#e6cf85}.boardBox{display:grid;place-items:center;min-height:430px}.board{display:grid;gap:4px}.row{display:flex;justify-content:center;gap:5px;height:55px;margin-top:-2px}.row:first-child{margin-top:0}.hex{width:64px;height:55px;clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);border:0;border-radius:0;display:grid;place-items:center;background:linear-gradient(145deg,#18181c,#070708);box-shadow:inset 0 0 0 1px #efe2c72d;color:#f3eee5;font-size:28px;font-weight:950;padding:0;transition:transform .2s ease,filter .2s ease}.hex.num{background:linear-gradient(150deg,#eee7d7,#c9bea3);color:#080808}.hex.num.revealed{filter:drop-shadow(0 0 14px #e6cf8566)}.hex.sel{box-shadow:inset 0 0 0 3px #e6cf85,0 0 22px #e6cf8566}.hex:disabled{opacity:1}.team{border:1px solid #efe2c714;border-left:6px solid var(--c);border-radius:18px;background:#0004;padding:12px}.team.on{outline:2px solid #e6cf85}.team input{border:0;background:transparent;font-weight:900;font-size:18px;padding:0}.score{font-size:58px;font-weight:950;line-height:1;margin:8px 0}.ans input{text-align:center;text-transform:uppercase;letter-spacing:.18em;font-size:28px;font-weight:900}.pill{display:inline-block;border:1px solid #efe2c71f;border-radius:999px;background:#0004;padding:5px 8px;margin:0 5px 6px 0;font-size:13px}.pill.done{border-color:#4bc47a;background:#4bc47a22}.log{display:grid;gap:7px;max-height:245px;overflow:auto}.log div{border:1px solid #efe2c714;background:#0004;border-radius:12px;padding:8px;font-size:13px}.ok{border-left:4px solid #4bc47a!important}.err{border-left:4px solid #d94b4b!important}.kbd{border:1px solid #fff4;border-radius:7px;padding:1px 6px}.msg{border:1px solid #efe2c714;border-radius:14px;background:#0004;padding:10px;color:#f3eee5b0;line-height:1.5}.msg strong{color:#e6cf85}@media(max-width:1100px){.app{grid-template-columns:1fr}.metric{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<main class="app">
  <header class="top"><div><h1>HEXAGON 控制台</h1><div class="sub">投屏页只显示蜂巢、目标数和倒计时；这里负责计时、抢答、判题、比分。</div></div><div class="stack"><button class="primary" id="open">打开投屏页</button><button id="clean">投屏提示开/关</button></div></header>
  <aside class="panel"><section class="sec"><h2>设置</h2><div class="g2"><p><label>总轮数</label><input id="tot" type="number" value="10" min="1" max="30"></p><p><label>记忆秒数</label><input id="mem" type="number" value="30" min="3" max="180"></p><p><label>作答秒数</label><input id="ansS" type="number" value="10" min="3" max="60"></p><p><label>无人抢答秒数</label><input id="idle" type="number" value="90" min="10" max="300"></p><p><label>最少正解</label><input id="min" type="number" value="2" min="1" max="20"></p><p><label>最多正解</label><input id="max" type="number" value="7" min="1" max="27"></p></div></section><section class="sec stack"><h2>比赛控制</h2><button class="primary" id="new">开始新比赛</button><div class="g2"><button id="next">下一轮</button><button id="end">结束本轮</button><button id="pause">暂停</button><button id="resume">继续</button><button class="bad" id="reset">重置</button></div><div class="msg">抢答快捷键：清华 <span class="kbd">Q</span>，北大 <span class="kbd">P</span>。提交答案按 Enter。</div></section><section class="sec"><h2>规则</h2><div class="hint">正确后，对应 3 个格子会在投屏页和控制台预览区翻回数字；其他格子继续显示字母。</div></section></aside>
  <section class="panel"><div class="metric"><div class="m"><span>阶段</span><b id="ph">待开始</b></div><div class="m"><span>倒计时</span><b id="time">--</b></div><div class="m"><span>轮次</span><b id="round">0/10</b></div><div class="m target"><span>目标</span><b id="tar">—</b></div></div><div class="boardBox"><div class="board" id="board"></div></div><section class="sec"><div class="msg" id="msg">当前无比赛。</div></section></section>
  <aside class="panel"><section class="sec"><h2>比分与抢答</h2><div class="g2"><div class="team" id="tc" style="--c:#6c55c8"><input id="tn" value="清华"><div class="score" id="ts">0</div><button class="primary" id="tb">清华抢答 Q</button><div class="g2" style="margin-top:8px"><button id="ta">+1</button><button id="tm">-1</button></div></div><div class="team" id="pc" style="--c:#b91b2c"><input id="pn" value="北大"><div class="score" id="ps">0</div><button class="primary" id="pb">北大抢答 P</button><div class="g2" style="margin-top:8px"><button id="pa">+1</button><button id="pm">-1</button></div></div></div></section><section class="sec stack ans"><h2 id="at">等待抢答</h2><input id="inp" maxlength="8" placeholder="如 ADH" disabled><div class="g2"><button class="primary" id="sub" disabled>提交</button><button id="can" disabled>取消</button></div></section><section class="sec"><h2>本轮答案</h2><div id="sol"></div></section><section class="sec"><h2>记录</h2><div class="log" id="log"></div></section></aside>
</main>
<script src="../sync.js"></script>
<script>
(()=>{
const K='hexagon:v2:state',C='hexagon-v2',L=[['A','B','C'],['D','E','F','G'],['H','I','J','K','L'],['M','N','O','P'],['Q','R','S']],A=L.flat(),$=x=>document.getElementById(x),bc='BroadcastChannel'in window?new BroadcastChannel(C):null;
const E={tot:$('tot'),mem:$('mem'),ansS:$('ansS'),idle:$('idle'),min:$('min'),max:$('max'),open:$('open'),clean:$('clean'),new:$('new'),next:$('next'),end:$('end'),pause:$('pause'),resume:$('resume'),reset:$('reset'),ph:$('ph'),time:$('time'),round:$('round'),tar:$('tar'),board:$('board'),msg:$('msg'),tc:$('tc'),pc:$('pc'),tn:$('tn'),pn:$('pn'),ts:$('ts'),ps:$('ps'),tb:$('tb'),pb:$('pb'),ta:$('ta'),tm:$('tm'),pa:$('pa'),pm:$('pm'),at:$('at'),inp:$('inp'),sub:$('sub'),can:$('can'),sol:$('sol'),log:$('log')};
let set={tot:10,mem:30,ans:10,idle:90,min:2,max:7},T=null,timerDone=null,logs=[],revealT=null,_sync=null;
const REVEAL_MS=3000;
function fresh(){return{phase:'idle',round:0,total:set.tot,timer:null,target:null,numbers:{},solutions:[],used:[],team:null,message:'当前无比赛。',scores:{thu:0,pku:0},teams:{thu:'清华',pku:'北大'},winner:'',clean:true,flashAt:0,showHint:false,reveal:null}}
function saved(){try{return JSON.parse(localStorage.getItem(K))}catch{return null}}
let S=saved()||fresh();
const start=[{r:-2,q:0},{r:-1,q:-1},{r:0,q:-2},{r:1,q:-2},{r:2,q:-2}],dir=[[1,0],[0,1],[-1,1]],c2=new Map,l2=new Map;
L.forEach((r,i)=>r.forEach((x,j)=>{let c={q:start[i].q+j,r:start[i].r};c2.set(c.q+','+c.r,x);l2.set(x,c)}));
const canon=s=>[...s].sort().join(''),lines=[];
for(const x of A){let c=l2.get(x);for(const d of dir){let a=[];for(let k=0;k<3;k++){let y=c2.get(c.q+d[0]*k+','+(c.r+d[1]*k));if(!y)break;a.push(y)}if(a.length===3&&!lines.some(z=>z.key===canon(a.join(''))))lines.push({key:canon(a.join('')),txt:a.join(''),letters:a})}}
function num(e,d,mi,ma){let v=parseInt(e.value,10);return Number.isFinite(v)?Math.min(ma,Math.max(mi,v)):d}
function read(){set={tot:num(E.tot,10,1,30),mem:num(E.mem,30,3,180),ans:num(E.ansS,10,3,60),idle:num(E.idle,90,10,300),min:num(E.min,2,1,27),max:num(E.max,7,1,27)};if(set.min>set.max)[set.min,set.max]=[set.max,set.min];Object.assign(E.tot,{value:set.tot});Object.assign(E.mem,{value:set.mem});Object.assign(E.ansS,{value:set.ans});Object.assign(E.idle,{value:set.idle});Object.assign(E.min,{value:set.min});Object.assign(E.max,{value:set.max});S.total=set.tot}
function name(t){return(t==='thu'?E.tn.value:E.pn.value).trim()||(t==='thu'?'清华':'北大')}
function publish(){S.teams={thu:name('thu'),pku:name('pku')};localStorage.setItem(K,JSON.stringify(S));bc&&bc.postMessage(S);if(_sync)_sync.pushState(S);render()}
function addLog(a,b,cl=''){logs.unshift({a,b,cl,t:new Date().toLocaleTimeString('zh-CN',{hour12:false})});logs=logs.slice(0,80);render()}
function gen(){for(let z=0;z<500;z++){let numbers=Object.fromEntries(A.map(x=>[x,1+Math.floor(Math.random()*9)])),m=new Map;for(const l of lines){let vals=l.letters.map(x=>numbers[x]),sum=vals.reduce((a,b)=>a+b,0);if(!m.has(sum))m.set(sum,[]);m.get(sum).push({...l,vals,sum})}let opts=[...m.entries()].filter(([,v])=>v.length>=set.min&&v.length<=set.max);if(!opts.length)opts=[...m.entries()];let pick=opts[Math.floor(Math.random()*opts.length)];return{numbers,target:pick[0],solutions:pick[1].sort((a,b)=>a.txt.localeCompare(b.txt))}}}
function stop(){clearInterval(T);T=null;timerDone=null;S.endAt=null}
function flashReveal(key){clearTimeout(revealT);S.reveal=key;S.revealAt=Date.now();revealT=setTimeout(()=>{S.reveal=null;publish()},REVEAL_MS)}
function clearReveal(){clearTimeout(revealT);S.reveal=null}
function countdown(sec,done){stop();timerDone=done;let end=Date.now()+sec*1000;S.timer=sec;S.endAt=end;publish();T=setInterval(()=>{S.timer=Math.max(0,Math.ceil((end-Date.now())/1000));render();if(S.timer<=0){let f=timerDone;stop();f&&f()}},250)}
function newGame(){read();stop();logs=[];S=fresh();S.total=set.tot;S.scores={thu:0,pku:0};addLog('比赛开始','共 '+set.tot+' 轮');nextRound()}
function nextRound(){read();stop();clearReveal();if(S.round>=set.tot)return finish();let g=gen();Object.assign(S,{round:S.round+1,total:set.tot,phase:'memorize',timer:set.mem,target:g.target,numbers:g.numbers,solutions:g.solutions,used:[],team:null,winner:'',message:'<strong>第 '+(S.round+1)+' 轮</strong>：记忆数字。',flashAt:Date.now(),reveal:null});publish();countdown(set.mem,startAnswering)}
function startAnswering(){Object.assign(S,{phase:'answering',team:null,message:'目标数：<strong>'+S.target+'</strong>',flashAt:Date.now()});E.inp.value='';publish();countdown(set.idle,()=>endRound('无人抢答'))}
function buzz(t){if(S.phase!=='answering')return;Object.assign(S,{phase:'responding',team:t,message:name(t)+' 抢答，'+set.ans+' 秒内作答。'});E.inp.value='';publish();E.inp.focus();countdown(set.ans,timeout)}
function norm(s){return String(s).toUpperCase().replace(/[^A-S]/g,'').slice(0,3)}
function judge(a){if(a.length!==3)return[0,'答案必须是 3 个字母'];if(new Set(a).size!==3)return[0,'字母不能重复'];let key=canon(a),line=lines.find(x=>x.key===key);if(!line)return[0,'不是连续直线'];let sol=(S.solutions||[]).find(x=>x.key===key);if(!sol){let vals=line.letters.map(x=>S.numbers[x]),sum=vals.reduce((x,y)=>x+y,0);return[0,line.txt+' = '+vals.join('+')+' = '+sum+'，不是 '+S.target]}if((S.used||[]).includes(key))return[0,'这组已经答过'];return[1,sol]}
function submit(){if(S.phase!=='responding')return;clearInterval(T);T=null;timerDone=null;let t=S.team,a=norm(E.inp.value),j=judge(a);if(j[0]){let sol=j[1];S.used.push(sol.key);S.scores[t]=(S.scores[t]||0)+1;S.message='<strong>正确</strong>：'+sol.txt+' = '+sol.vals.join('+')+' = '+S.target;S.flashAt=Date.now();addLog('正确 +1',name(t)+'：'+sol.txt,'ok');flashReveal(sol.key);publish();if(S.used.length>=S.solutions.length){setTimeout(()=>endRound('全部正解已答出'),REVEAL_MS+300);return}}else{S.scores[t]=(S.scores[t]||0)-1;S.message='<strong>错误</strong>：'+j[1];S.flashAt=Date.now();addLog('错误 -1',name(t)+'：'+(a||'空答案')+'。'+j[1],'err')}
S.phase='answering';S.team=null;E.inp.value='';publish();countdown(set.idle,()=>endRound('无人抢答'))}
function timeout(){if(S.phase!=='responding')return;let t=S.team;S.scores[t]=(S.scores[t]||0)-1;S.phase='answering';S.team=null;S.message='<strong>超时</strong>：'+name(t)+' -1';addLog('超时 -1',name(t),'err');E.inp.value='';publish();countdown(set.idle,()=>endRound('无人抢答'))}
function cancel(){if(S.phase!=='responding')return;stop();addLog('取消抢答',name(S.team));S.phase='answering';S.team=null;S.message='抢答已取消，继续抢答。';E.inp.value='';publish();countdown(set.idle,()=>endRound('无人抢答'))}
function endRound(reason='主持人结束'){if(['idle','finished'].includes(S.phase))return;stop();clearReveal();S.timer=0;S.team=null;S.message='第 '+S.round+' 轮结束：'+reason;addLog('第 '+S.round+' 轮结束',reason+'。正解 '+(S.solutions||[]).length+' 组，答出 '+(S.used||[]).length+' 组。');if(S.round>=S.total){finish()}else{S.phase='between';publish()}}
function finish(){stop();let a=S.scores.thu,b=S.scores.pku,w=a===b?'平局':(a>b?name('thu'):name('pku'))+' 获胜';Object.assign(S,{phase:'finished',winner:w,message:'比赛结束：'+w,timer:0});addLog('比赛结束',w+'。比分 '+a+' - '+b,'ok');publish()}
function score(t,d){S.scores[t]=(S.scores[t]||0)+d;publish()}
function pause(){if(!T)return;clearInterval(T);T=null;S.endAt=null;S.message='计时已暂停。';publish()}
function resume(){if(!timerDone||!Number.isFinite(S.timer)||S.timer<=0)return;countdown(S.timer,timerDone)}
function revealedSet(){let set=new Set;if(S.reveal)[...S.reveal].forEach(x=>set.add(x));return set}
function draw(){let rev=revealedSet(),pick=[...norm(E.inp.value)];E.board.innerHTML='';L.forEach(r=>{let row=document.createElement('div');row.className='row';r.forEach(x=>{let b=document.createElement('button'),showNum=S.phase==='memorize'||rev.has(x);b.className='hex '+(showNum?'num ':'')+(rev.has(x)?'revealed ':'')+(pick.includes(x)?'sel ':'');b.textContent=showNum&&S.numbers&&S.numbers[x]!=null?S.numbers[x]:x;b.disabled=S.phase!=='responding';b.onclick=()=>{let a=[...norm(E.inp.value)],i=a.indexOf(x);if(i>=0)a.splice(i,1);else{if(a.length>=3)a.shift();a.push(x)}E.inp.value=a.join('');draw()};row.appendChild(b)});E.board.appendChild(row)})}
function render(){E.ph.textContent={idle:'待开始',memorize:'记忆',answering:'抢答',responding:'作答',between:'轮间',finished:'结束'}[S.phase]||'待开始';E.time.textContent=Number.isFinite(S.timer)?S.timer:'--';E.round.textContent=(S.round||0)+'/'+(S.total||set.tot);E.tar.textContent=S.phase==='memorize'||S.target==null?'—':S.target;E.msg.innerHTML=S.message||'';E.ts.textContent=S.scores.thu||0;E.ps.textContent=S.scores.pku||0;E.tc.classList.toggle('on',S.team==='thu');E.pc.classList.toggle('on',S.team==='pku');E.tb.disabled=E.pb.disabled=S.phase!=='answering';E.inp.disabled=E.sub.disabled=E.can.disabled=S.phase!=='responding';E.next.disabled=S.phase!=='between';E.end.disabled=['idle','finished'].includes(S.phase);E.at.textContent=S.phase==='responding'?name(S.team)+' 作答':'等待抢答';draw();E.sol.innerHTML=(S.solutions||[]).map(s=>'<span class="pill '+((S.used||[]).includes(s.key)?'done':'')+'">'+s.txt+'（'+s.vals.join('+')+'）</span>').join('')||'<span class="hint">暂无</span>';E.log.innerHTML=logs.map(x=>'<div class="'+x.cl+'"><b>'+x.a+'</b> <span class="hint">'+x.t+'</span><br><span class="hint">'+x.b+'</span></div>').join('')}
E.open.onclick=()=>window.open('./','hexagon_display');E.clean.onclick=()=>{S.showHint=!S.showHint;publish()};E.new.onclick=newGame;E.next.onclick=nextRound;E.end.onclick=()=>endRound('主持人结束');E.pause.onclick=pause;E.resume.onclick=resume;E.reset.onclick=()=>{stop();clearReveal();S=fresh();logs=[];publish()};E.tb.onclick=()=>buzz('thu');E.pb.onclick=()=>buzz('pku');E.ta.onclick=()=>score('thu',1);E.tm.onclick=()=>score('thu',-1);E.pa.onclick=()=>score('pku',1);E.pm.onclick=()=>score('pku',-1);E.sub.onclick=submit;E.can.onclick=cancel;E.inp.oninput=()=>{E.inp.value=norm(E.inp.value);draw()};E.inp.onkeydown=e=>{if(e.key==='Enter')submit()};document.onkeydown=e=>{if(e.target.tagName==='INPUT'&&e.target!==E.inp)return;if(e.key.toLowerCase()==='q')buzz('thu');if(e.key.toLowerCase()==='p')buzz('pku')};
render();
// Cross-device: claim the single-console lock, then push current state out.
(async()=>{
  if(!window.Sync)return;
  _sync=Sync.console('hexagon');
  let res=await _sync.claim(false);
  if(res&&!res.ok){if(confirm('已有一个控制台在线，是否强制接管？'))res=await _sync.claim(true);}
  if(res&&res.ok)publish();
})();
})();
</script>
</body>
</html>
