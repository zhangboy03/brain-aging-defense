<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HEXAGON 控制台</title><style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#5038b633,transparent 28%),radial-gradient(circle at 80% 0,#9d142733,transparent 30%),#070708;color:#f3eee5;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}button,input{font:inherit}button{border:1px solid #efe2c71f;border-radius:13px;background:#ffffff10;color:#f3eee5;padding:10px 12px;cursor:pointer}button:disabled{opacity:.38;cursor:not-allowed}.primary{background:linear-gradient(#e6cf85,#a77d31);color:#120d03;font-weight:900}.bad{background:#95192b88}.app{display:grid;grid-template-columns:300px 1fr 340px;gap:14px;padding:14px}.top,.panel{background:#111114df;border:1px solid #efe2c71c;border-radius:22px;box-shadow:0 24px 70px #0008}.top{grid-column:1/-1;display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px}h1{margin:0;font-size:28px;letter-spacing:.08em}h2{margin:0 0 11px;font-size:17px}.sub,.hint{color:#f3eee59a;font-size:13px;line-height:1.5}.sec{padding:15px;border-bottom:1px solid #efe2c714}.sec:last-child{border-bottom:0}.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stack{display:grid;gap:8px}label{display:block;color:#f3eee59a;font-size:12px;margin:0 0 5px}input{width:100%;border:1px solid #efe2c71c;border-radius:13px;background:#0005;color:#fff;min-height:40px;padding:8px 10px}.metric{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:15px;border-bottom:1px solid #efe2c714}.m{background:#0004;border:1px solid #efe2c714;border-radius:16px;padding:11px;text-align:center}.m span{display:block;color:#f3eee59a;font-size:12px}.m b{display:block;font-size:34px;line-height:1}.target b{color:#e6cf85}.boardBox{display:grid;place-items:center;min-height:430px}.board{display:grid;gap:4px}.row{display:flex;justify-content:center;gap:5px;height:55px;margin-top:-2px}.row:first-child{margin-top:0}.hex{width:64px;height:55px;clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);border:0;border-radius:0;display:grid;place-items:center;background:linear-gradient(145deg,#18181c,#070708);box-shadow:inset 0 0 0 1px #efe2c72d;color:#f3eee5;font-size:28px;font-weight:950;padding:0}.hex.num{background:linear-gradient(150deg,#eee7d7,#c9bea3);color:#080808}.hex.sel{box-shadow:inset 0 0 0 3px #e6cf85,0 0 22px #e6cf8566}.hex.used{color:#e6cf85}.hex:disabled{opacity:1}.team{border:1px solid #efe2c714;border-left:6px solid var(--c);border-radius:18px;background:#0004;padding:12px}.team.on{outline:2px solid #e6cf85}.team input{border:0;background:transparent;font-weight:900;font-size:18px;padding:0}.score{font-size:58px;font-weight:950;line-height:1;margin:8px 0}.ans input{text-align:center;text-transform:uppercase;letter-spacing:.18em;font-size:28px;font-weight:900}.pill{display:inline-block;border:1px solid #efe2c71f;border-radius:999px;background:#0004;padding:5px 8px;margin:0 5px 6px 0;font-size:13px}.pill.done{border-color:#4bc47a;background:#4bc47a22}.log{display:grid;gap:7px;max-height:245px;overflow:auto}.log div{border:1px solid #efe2c714;background:#0004;border-radius:12px;padding:8px;font-size:13px}.ok{border-left:4px solid #4bc47a!important}.err{border-left:4px solid #d94b4b!important}.kbd{border:1px solid #fff4;border-radius:7px;padding:1px 6px}.msg{border:1px solid #efe2c714;border-radius:14px;background:#0004;padding:10px;color:#f3eee5b0;line-height:1.5}.msg strong{color:#e6cf85}@media(max-width:1100px){.app{grid-template-columns:1fr}.metric{grid-template-columns:repeat(2,1fr)}}
</style></head><body><main class="app"><header class="top"><div><h1>HEXAGON 控制台</h1><div class="sub">投屏页只显示蜂巢、目标数和倒计时；这里负责计时、抢答、判题、比分。</div></div><div class="stack"><button class="primary" id="open">打开投屏页</button><button id="clean">投屏提示开/关</button></div></header><aside class="panel"><section class="sec"><h2>设置</h2><div class="g2"><p><label>总轮数</label><input id="tot" type="number" value="10" min="1" max="30"></p><p><label>记忆秒数</label><input id="mem" type="number" value="30" min="3" max="180"></p><p><label>作答秒数</label><input id="ansS" type="number" value="10" min="3" max="60"></p><p><label>无人抢答秒数</label><input id="idle" type="number" value="90" min="10" max="300"></p><p><label>最少正解</label><input id="min" type="number" value="2" min="1" max="20"></p><p><label>最多正解</label><input id="max" type="number" value="7" min="1" max="27"></p></div></section><section class="sec stack"><h2>比赛控制</h2><button class="primary" id="new">开始新比赛</button><div class="g2"><button id="next">下一轮</button><button id="end">结束本轮</button><button id="pause">暂停</button><button id="resume">继续</button><button class="bad" id="reset">重置</button></div><div class="msg">抢答快捷键：清华 <span class="kbd">Q</span>，北大 <span class="kbd">P</span>。提交答案按 Enter。</div></section><section class="sec"><h2>规则</h2><div class="hint">19 格蜂巢，30 秒记忆；目标数出现后抢答一条横向或斜向连续三格。三格数字和等于目标数即正确。正确 +1，错误/重复/超时 -1。</div></section></aside><section class="panel"><div class="metric"><div class="m"><span>阶段</span><b id="ph">待开始</b></div><div class="m"><span>倒计时</span><b id="time">--</b></div><div class="m"><span>轮次</span><b id="round">0/10</b></div><div class="m target"><span>目标</span><b id="tar">—</b></div></div><div class="boardBox"><div class="board" id="board"></div></div><section class="sec"><div class="msg" id="msg">当前无比赛。</div></section></section><aside class="panel"><section class="sec"><h2>比分与抢答</h2><div class="g2"><div class="team" id="tc" style="--c:#6c55c8"><input id="tn" value="清华"><div class="score" id="ts">0</div><button class="primary" id="tb">清华抢答 Q</button><div class="g2" style="margin-top:8px"><button id="ta">+1</button><button id="tm">-1</button></div></div><div class="team" id="pc" style="--c:#b91b2c"><input id="pn" value="北大"><div class="score" id="ps">0</div><button class="primary" id="pb">北大抢答 P</button><div class="g2" style="margin-top:8px"><button id="pa">+1</button><button id="pm">-1</button></div></div></div></section><section class="sec stack ans"><h2 id="at">等待抢答</h2><input id="inp" maxlength="8" placeholder="如 ADH" disabled><div class="g2"><button class="primary" id="sub" disabled>提交</button><button id="can" disabled>取消</button></div></section><section class="sec"><h2>本轮答案</h2><div id="sol"></div></section><section class="sec"><h2>记录</h2><div class="log" id="log"></div></section></aside></main><script>
(()=>{const K='hexagon:v2:state',C='hexagon-v2',L=[['A','B','C'],['D','E','F','G'],['H','I','J','K','L'],['M','N','O','P'],['Q','R','S']],A=L.flat(),$=x=>document.getElementById(x),bc='BroadcastChannel'in window?new BroadcastChannel(C):null,E={tot:$('tot'),mem:$('mem'),ansS:$('ansS'),idle:$('idle'),min:$('min'),max:$('max'),open:$('open'),clean:$('clean'),new:$('new'),next:$('next'),end:$('end'),pause:$('pause'),resume:$('resume'),reset:$('reset'),ph:$('ph'),time:$('time'),round:$('round'),tar:$('tar'),board:$('board'),msg:$('msg'),tc:$('tc'),pc:$('pc'),tn:$('tn'),pn:$('pn'),ts:$('ts'),ps:$('ps'),tb:$('tb'),pb:$('pb'),ta:$('ta'),tm:$('tm'),pa:$('pa'),pm:$('pm'),at:$('at'),inp:$('inp'),sub:$('sub'),can:$('can'),sol:$('sol'),log:$('log')};let set={tot:10,mem:30,ans:10,idle:90,min:2,max:7},S=empty(),T=null,P=null,logs=[];function empty(){return{phase:'idle',round:0,total:set.tot,timer:null,target:null,numbers:{},solutions:[],used:[],team:null,message:'当前无比赛。',scores:{thu:0,pku:0},teams:{thu:'清华',pku:'北大'},winner:'',clean:true,flashAt:0,showHint:false}}const start=[{r:-2,q:0},{r:-1,q:-1},{r:0,q:-2},{r:1,q:-2},{r:2,q:-2}],dir=[[1,0],[0,1],[-1,1]],c2=new Map,l2=new Map;L.forEach((r,i)=>r.forEach((x,j)=>{let c={q:start[i].q+j,r:start[i].r};c2.set(c.q+','+c.r,x);l2.set(x,c)}));const can=s=>[...s].sort().join(''),lines=[];for(const x of A){let c=l2.get(x);for(const d of dir){let a=[];for(let k=0;k<3;k++){let y=c2.get(c.q+d[0]*k+','+(c.r+d[1]*k));if(!y)break;a.push(y)}if(a.length==3&&!lines.some(z=>z.key==can(a.join(''))))lines.push({key:can(a.join('')),txt:a.join(''),letters:a})}}function n(e,d,mi,ma){let v=parseInt(e.value,10);return Number.isFinite(v)?Math.min(ma,Math.max(mi,v)):d}function read(){set={tot:n(E.tot,10,1,30),mem:n(E.mem,30,3,180),ans:n(E.ansS,10,3,60),idle:n(E.idle,90,10,300),min:n(E.min,2,1,27),max:n(E.max,7,1,27)};if(set.min>set.max)[set.min,set.max]=[set.max,set.min];E.tot.value=set.tot;E.mem.value=set.mem;E.ansS.value=set.ans;E.idle.value=set.idle;E.min.value=set.min;E.max.value=set.max;S.total=set.tot}function name(t){return(t=='thu'?E.tn.value:E.pn.value).trim()||(t=='thu'?'清华':'北大')}function pub(){S.teams={thu:name('thu'),pku:name('pku')};localStorage.setItem(K,JSON.stringify(S));bc&&bc.postMessage(S);render()}function addlog(a,b,cl=''){logs.unshift({a,b,cl,t:new Date().toLocaleTimeString('zh-CN',{hour12:false})});logs=logs.slice(0,80);render()}function gen(){for(let z=0;z<500;z++){let nums=Object.fromEntries(A.map(x=>[x,1+Math.floor(Math.random()*9)])),m=new Map;for(const l of lines){let vals=l.letters.map(x=>nums[x]),sum=vals.reduce((a,b)=>a+b,0);(m.get(sum)||m.set(sum,[]).get(sum)).push({...l,vals,sum})}let o=[...m.entries()].filter(([,v])=>v.length>=set.min&&v.length<=set.max);if(!o.length)o=[...m.entries()];let p=o[Math.floor(Math.random()*o.length)];return{numbers:nums,target:p[0],solutions:p[1].sort((a,b)=>a.txt.localeCompare(b.txt))}}}function clear(){clearInterval(T);T=null;P=null}function timer(sec,done){clear();let end=Date.now()+sec*1000;S.timer=sec;pub();T=setInterval(()=>{S.timer=Math.max(0,Math.ceil((end-Date.now())/1000));pub();if(S.timer<=0){clear();done&&done()}},250)}function newGame(){read();clear();logs=[];S=empty();S.total=set.tot;S.scores={thu:0,pku:0};addlog('比赛开始','共 '+set.tot+' 轮');round()}function round(){read();clear();if(S.round>=set.tot)return finish();let g=gen();Object.assign(S,{round:S.round+1,total:set.tot,phase:'memorize',timer:set.mem,target:g.target,numbers:g.numbers,solutions:g.solutions,used:[],team:null,winner:'',message:'<strong>第 '+(S.round+1)+' 轮</strong>：记忆数字。',flashAt:Date.now()});pub();timer(set.mem,answer)}function answer(){Object.assign(S,{phase:'answering',team:null,message:'目标数：<strong>'+S.target+'</strong>',flashAt:Date.now()});E.inp.value='';pub();timer(set.idle,()=>endRound('无人抢答'))}function buzz(t){if(S.phase!='answering')return;Object.assign(S,{phase:'responding',team:t,message:name(t)+' 抢答，'+set.ans+' 秒内作答。'});E.inp.value='';pub();E.inp.focus();timer(set.ans,timeout)}function norm(s){return String(s).toUpperCase().replace(/[^A-S]/g,'').slice(0,3)}function judge(a){if(a.length!=3)return[0,'答案必须是 3 个字母'];if(new Set(a).size!=3)return[0,'字母不能重复'];let key=can(a),l=lines.find(x=>x.key==key);if(!l)return[0,'不是连续直线'];let sol=S.solutions.find(x=>x.key==key);if(!sol){let v=l.letters.map(x=>S.numbers[x]),sum=v.reduce((a,b)=>a+b,0);return[0,l.txt+' = '+v.join('+')+' = '+sum+'，不是 '+S.target]}if(S.used.includes(key))return[0,'这组已经答过'];return[1,sol]}function score(t,d){S.scores[t]=(S.scores[t]||0)+d;pub()}function submit(){if(S.phase!='responding')return;clear();let t=S.team,a=norm(E.inp.value),j=judge(a);if(j[0]){let l=j[1];S.used.push(l.key);score(t,1);S.message='<strong>正确</strong>：'+l.txt+' = '+l.vals.join('+')+' = '+S.target;S.flashAt=Date.now();addlog('正确 +1',name(t)+'：'+l.txt,'ok');if(S.used.length>=S.solutions.length)return endRound('全部正解已答出')}else{score(t,-1);S.message='<strong>错误</strong>：'+j[1];S.flashAt=Date.now();addlog('错误 -1',name(t)+'：'+(a||'空答案')+'。'+j[1],'err')}S.phase='answering';S.team=null;E.inp.value='';pub();timer(set.idle,()=>endRound('无人抢答'))}function timeout(){if(S.phase!='responding')return;let t=S.team;score(t,-1);S.message='<strong>超时</strong>：'+name(t)+' -1';addlog('超时 -1',name(t),'err');S.phase='answering';S.team=null;E.inp.value='';pub();timer(set.idle,()=>endRound('无人抢答'))}function cancel(){if(S.phase!='responding')return;clear();addlog('取消抢答',name(S.team));S.phase='answering';S.team=null;S.message='抢答已取消，继续抢答。';E.inp.value='';pub();timer(set.idle,()=>endRound('无人抢答'))}function endRound(r='主持人结束'){if(S.phase=='idle'||S.phase=='finished')return;clear();S.phase=S.round>=set.tot?'finished':'between';S.timer=0;S.team=null;S.message='第 '+S.round+' 轮结束：'+r;addlog('第 '+S.round+' 轮结束',r+'。正解 '+S.solutions.length+' 组，答出 '+S.used.length+' 组。');S.phase=='finished'?finish():pub()}function finish(){clear();S.phase='finished';let a=S.scores.thu,b=S.scores.pku,w=a==b?'平局':(a>b?name('thu'):name('pku'))+' 获胜';S.winner=w;S.message='比赛结束：'+w;addlog('比赛结束',w+'。比分 '+a+' - '+b,'ok');pub()}function pause(){if(!T)return;P={phase:S.phase,timer:S.timer};clearInterval(T);T=null;S.message='计时已暂停。';pub()}function resume(){if(!P)return;let d=P.phase=='memorize'?answer:P.phase=='answering'?()=>endRound('无人抢答'):timeout;P=null;timer(S.timer,d)}function render(){E.ph.textContent={idle:'待开始',memorize:'记忆',answering:'抢答',responding:'作答',between:'轮间',finished:'结束'}[S.phase];E.time.textContent=Number.isFinite(S.timer)?S.timer:'--';E.round.textContent=(S.round||0)+'/'+(S.total||set.tot);E.tar.textContent=S.phase=='memorize'||S.target==null?'—':S.target;E.msg.innerHTML=S.message||'';E.ts.textContent=S.scores.thu;E.ps.textContent=S.scores.pku;E.tc.classList.toggle('on',S.team=='thu');E.pc.classList.toggle('on',S.team=='pku');E.tb.disabled=E.pb.disabled=S.phase!='answering';E.inp.disabled=E.sub.disabled=E.can.disabled=S.phase!='responding';E.next.disabled=S.phase!='between';E.end.disabled=!S.phase||['idle','finished'].includes(S.phase);E.at.textContent=S.phase=='responding'?name(S.team)+' 作答':'等待抢答';draw();E.sol.innerHTML=(S.solutions||[]).map(s=>'<span class="pill '+(S.used.includes(s.key)?'done':'')+'">'+s.txt+'（'+s.vals.join('+')+'）</span>').join('')||'<span class="hint">暂无</span>';E.log.innerHTML=logs.map(x=>'<div class="'+x.cl+'"><b>'+x.a+'</b> <span class="hint">'+x.t+'</span><br><span class="hint">'+x.b+'</span></div>').join('')}function draw(){let used=new Set;S.used.forEach(k=>[...k].forEach(x=>used.add(x)));let pick=[...norm(E.inp.value)];E.board.innerHTML='';L.forEach(r=>{let row=document.createElement('div');row.className='row';r.forEach(x=>{let b=document.createElement('button');b.className='hex '+(S.phase=='memorize'?'num ':'')+(pick.includes(x)?'sel ':'')+(used.has(x)?'used':'');b.textContent=S.phase=='memorize'&&S.numbers[x]!=null?S.numbers[x]:x;b.disabled=S.phase!='responding';b.onclick=()=>{let a=[...norm(E.inp.value)],i=a.indexOf(x);if(i>=0)a.splice(i,1);else{if(a.length>=3)a.shift();a.push(x)}E.inp.value=a.join('');draw()};row.appendChild(b)});E.board.appendChild(row)})}E.open.onclick=()=>window.open('./','hexagon_display');E.clean.onclick=()=>{S.showHint=!S.showHint;pub()};E.new.onclick=newGame;E.next.onclick=round;E.end.onclick=()=>endRound('主持人结束');E.pause.onclick=pause;E.resume.onclick=resume;E.reset.onclick=()=>{clear();S=empty();logs=[];pub()};E.tb.onclick=()=>buzz('thu');E.pb.onclick=()=>buzz('pku');E.ta.onclick=()=>score('thu',1);E.tm.onclick=()=>score('thu',-1);E.pa.onclick=()=>score('pku',1);E.pm.onclick=()=>score('pku',-1);E.sub.onclick=submit;E.can.onclick=cancel;E.inp.oninput=()=>{E.inp.value=norm(E.inp.value);draw()};E.inp.onkeydown=e=>{if(e.key=='Enter')submit()};document.onkeydown=e=>{if(e.target.tagName=='INPUT'&&e.target!=E.inp)return;if(e.key.toLowerCase()=='q')buzz('thu');if(e.key.toLowerCase()=='p')buzz('pku')};pub()})();
</script></body></html>
