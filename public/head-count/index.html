<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>进出数数 · 主持人控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Gochi+Hand&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1b1b1a; --paper: #f6f3ea; --line: #cfc7b3;
      --thu: #6a2c8f; --pku: #c0392b; --green: #34b85a; --red: #e23b34;
      --panel: #ffffff; --muted: #6b6b6b; --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: #eef0f4; color: #1c1c1c;
      font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      display: grid; grid-template-columns: 420px 1fr; height: 100vh; overflow: hidden;
    }
    h1 { font-size: 18px; margin: 0 0 2px; }
    .sub { font-size: 12px; color: var(--muted); }

    /* left control column */
    .controls { background: var(--panel); border-right: 1px solid #dfe3ea; padding: 16px 18px; overflow-y: auto; }
    .block { margin-bottom: 18px; }
    .block > .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .presets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .presets button, .seg button {
      padding: 9px 10px; border: 1px solid #d3d8e0; background: #f7f8fa; border-radius: 9px;
      cursor: pointer; font-size: 14px; transition: .12s;
    }
    .presets button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .seg { display: flex; gap: 8px; }
    .seg button { flex: 1; }
    .seg button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
    .row label { flex: 0 0 96px; font-size: 13px; color: #444; }
    .row input[type=range] { flex: 1; }
    .row .val { flex: 0 0 56px; text-align: right; font-variant-numeric: tabular-nums; font-size: 13px; color: #222; }
    .row input[type=text] { flex: 1; padding: 7px 9px; border: 1px solid #d3d8e0; border-radius: 8px; font-size: 14px; }
    .check { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 8px 0; }

    .btns { display: grid; gap: 8px; }
    .btn {
      padding: 11px 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600;
      background: #e8ebf0; color: #222; transition: .12s;
    }
    .btn:hover { filter: brightness(.97); }
    .btn.primary { background: var(--ink); color: #fff; }
    .btn.go { background: var(--green); color: #fff; }
    .btn.reveal { background: var(--accent); color: #fff; }
    .btn.ghost { background: #f1f3f7; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* right column */
    .stagecol { padding: 16px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; }
    .pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; background: #e3e7ee; color: #555; }
    .pill.live { background: #dff5e4; color: #1e7a39; }
    .pill.off { background: #fde2e0; color: #a3382f; }

    .previewwrap { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: start; }
    .preview {
      background: #fffdf7; border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
      aspect-ratio: 5 / 6; position: relative; box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    .preview svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    .info { background: #fff; border: 1px solid #e2e6ec; border-radius: 12px; padding: 14px; }
    .info h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .answerbig { font-family: 'Gochi Hand', cursive; font-size: 64px; line-height: 1; color: var(--ink); }
    .meta { font-size: 13px; color: #555; margin: 6px 0; }
    .events { font-size: 13px; line-height: 1.7; max-height: 200px; overflow-y: auto; color: #333; }
    .events .e { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 6px; background: #f0f2f6; }
    .events .e.in { background: #e3f0ff; }
    .events .e.out { background: #ffeede; }
    .hostonly { font-size: 11px; color: #b08900; background: #fff7e0; padding: 2px 7px; border-radius: 5px; }

    /* judge panel */
    .judge { background: #fff; border: 1px solid #e2e6ec; border-radius: 12px; padding: 14px; }
    .teams { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .team { border: 1px solid #e6e9ef; border-radius: 10px; padding: 12px; }
    .team h4 { margin: 0 0 8px; font-size: 14px; }
    .team.thu h4 { color: var(--thu); }
    .team.pku h4 { color: var(--pku); }
    .team .scorebig { font-family: 'Gochi Hand', cursive; font-size: 40px; line-height: 1; margin-bottom: 8px; }
    .team input { width: 100%; padding: 9px; border: 1px solid #d3d8e0; border-radius: 8px; font-size: 18px; text-align: center; }
    .team .v { font-size: 13px; min-height: 1.3em; margin-top: 6px; }
    .team .v.right { color: var(--green); } .team .v.wrong { color: var(--red); }
    .miniadj { display: flex; gap: 6px; margin-top: 8px; }
    .miniadj button { flex: 1; padding: 5px; border: 1px solid #d3d8e0; background: #f7f8fa; border-radius: 7px; cursor: pointer; }

    /* stage styles reused for mini preview (paper look) */
    .hc-fill { fill: var(--ink); } .hc-window, .hc-door { fill: #fffdf7; }
    .hc-groundline { stroke: #d9d2bf; stroke-width: 3; stroke-linecap: round; }
    .hc-person circle, .hc-person path { fill: var(--ink); }
    .hc-person.is-answer circle, .hc-person.is-answer path { fill: var(--red); }
    .hc-toptext { fill: #6f6856; font-size: 40px; letter-spacing: .14em; }
    .hc-count { fill: var(--ink); font-family: 'Gochi Hand', cursive; font-size: 150px; }
    .hc-smallnum { fill: var(--ink); font-family: 'Gochi Hand', cursive; font-size: 88px; }
    .hc-bignum { fill: var(--ink); font-family: 'Gochi Hand', cursive; font-size: 200px; }
    .hc-divider { stroke: #d9d2bf; stroke-width: 3; }
    .hc-check { fill: none; stroke: var(--green); stroke-width: 22; stroke-linecap: round; stroke-linejoin: round; }
    .hc-prompt text { fill: #8a826d; font-size: 30px; letter-spacing: .1em; }
  </style>
</head>
<body>
  <!-- LEFT: controls -->
  <div class="controls">
    <div class="block">
      <h1>进出数数 · 主控台</h1>
      <div class="sub">清华 × 北大现场版 · 自制原型</div>
    </div>

    <div class="block">
      <div class="label">难度预设</div>
      <div class="presets" id="presets"></div>
    </div>

    <div class="block">
      <div class="label">答题模式</div>
      <div class="seg" id="mode">
        <button data-mode="both" class="active">双队同时</button>
        <button data-mode="turn">单队轮流</button>
      </div>
    </div>

    <div class="block">
      <div class="label">题目种子</div>
      <div class="row">
        <input type="text" id="seed" placeholder="留空随机" />
        <button class="btn ghost" id="reseed" style="flex:0 0 auto;padding:7px 12px;">随机</button>
      </div>
    </div>

    <div class="block">
      <div class="label">微调（覆盖预设）</div>
      <div class="row"><label>起始展示</label><input type="range" id="t_observe" min="600" max="2400" step="50"><span class="val" id="v_observe"></span></div>
      <div class="row"><label>房屋落下</label><input type="range" id="t_drop" min="400" max="1400" step="50"><span class="val" id="v_drop"></span></div>
      <div class="row"><label>移动时长</label><input type="range" id="t_move" min="400" max="1400" step="20"><span class="val" id="v_move"></span></div>
      <div class="row"><label>事件间隔</label><input type="range" id="t_gap" min="180" max="1200" step="20"><span class="val" id="v_gap"></span></div>
      <div class="row"><label>事件数量</label><input type="range" id="t_events" min="3" max="20" step="1"><span class="val" id="v_events"></span></div>
      <div class="row"><label>每波最多</label><input type="range" id="t_wave" min="1" max="6" step="1"><span class="val" id="v_wave"></span></div>
      <div class="check"><input type="checkbox" id="t_chimney"><label for="t_chimney" style="flex:none">允许烟囱进出</label></div>
    </div>

    <div class="block btns">
      <button class="btn primary" id="gen">① 生成题目</button>
      <div class="btn2">
        <button class="btn" id="openPlayer">② 打开选手大屏</button>
        <button class="btn ghost" id="pingPlayer">检测连接</button>
      </div>
      <button class="btn go" id="start" disabled>③ 开始观察</button>
      <div class="btn2">
        <button class="btn ghost" id="replay" disabled>重播</button>
        <button class="btn reveal" id="reveal" disabled>④ 揭晓答案</button>
      </div>
      <button class="btn" id="next" disabled>⑤ 下一题</button>
    </div>
  </div>

  <!-- RIGHT: preview + judge -->
  <div class="stagecol">
    <div class="topbar">
      <div>
        <strong id="roundLabel">第 1 题</strong>
        <span class="sub" id="phaseLabel"> · 等待出题</span>
      </div>
      <div>
        <span class="pill" id="conn">选手屏未连接</span>
      </div>
    </div>

    <div class="previewwrap">
      <div class="preview"><svg id="mini"></svg></div>
      <div class="info">
        <h3>本题信息 <span class="hostonly">仅主持人可见</span></h3>
        <div class="meta">正确答案</div>
        <div class="answerbig" id="answer">—</div>
        <div class="meta" id="startMeta">起始人数：—</div>
        <div class="meta">事件序列：</div>
        <div class="events" id="eventList"></div>
      </div>
    </div>

    <div class="judge">
      <h3 style="margin:0 0 10px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">判分</h3>
      <div class="teams">
        <div class="team thu">
          <h4>清华队</h4>
          <div class="scorebig" id="sThu">0</div>
          <input type="number" id="aThu" placeholder="清华答案" />
          <div class="v" id="vThu"></div>
          <div class="miniadj"><button data-team="thu" data-d="-1">−1</button><button data-team="thu" data-d="1">+1</button></div>
        </div>
        <div class="team pku">
          <h4>北大队</h4>
          <div class="scorebig" id="sPku">0</div>
          <input type="number" id="aPku" placeholder="北大答案" />
          <div class="v" id="vPku"></div>
          <div class="miniadj"><button data-team="pku" data-d="-1">−1</button><button data-team="pku" data-d="1">+1</button></div>
        </div>
      </div>
      <div class="btn2" style="margin-top:12px;">
        <button class="btn primary" id="judge" disabled>判定并计分</button>
        <button class="btn ghost" id="resetScores">清零比分</button>
      </div>
    </div>
  </div>

  <script src="core.js"></script>
  <script src="../sync.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const bc = ('BroadcastChannel' in window) ? new BroadcastChannel('head-count') : null;

    // --- state ---
    const state = {
      presetKey: 'standard',
      mode: 'both',
      round: null,
      roundNo: parseInt(localStorage.getItem('hc_roundNo') || '1', 10),
      scores: JSON.parse(localStorage.getItem('hc_scores') || '{"thu":0,"pku":0}'),
      playerReady: false,
      revealed: false,
    };

    // --- mini preview stage ---
    const mini = HeadCount.HeadCountStage($('mini'), {
      onPhase(p) {
        const labels = { idle: '等待出题', ready: '题目已生成', observe: '观察中…', drop: '房屋落下', events: '进出中…', settle: '请作答', reveal: '已揭晓' };
        $('phaseLabel').textContent = ' · ' + (labels[p] || p);
      },
    });

    // --- presets UI ---
    const presetBox = $('presets');
    HeadCount.PRESET_ORDER.forEach((key) => {
      const b = document.createElement('button');
      b.textContent = HeadCount.PRESETS[key].label;
      b.dataset.key = key;
      if (key === state.presetKey) b.classList.add('active');
      b.onclick = () => { state.presetKey = key; [...presetBox.children].forEach(c => c.classList.toggle('active', c === b)); loadPresetIntoSliders(key); };
      presetBox.appendChild(b);
    });

    // mode UI
    $('mode').querySelectorAll('button').forEach(b => {
      b.onclick = () => { state.mode = b.dataset.mode; $('mode').querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b)); };
    });

    // sliders
    const sliders = {
      observe: ['t_observe', 'v_observe', (v) => v + 'ms'],
      drop: ['t_drop', 'v_drop', (v) => v + 'ms'],
      move: ['t_move', 'v_move', (v) => v + 'ms'],
      gap: ['t_gap', 'v_gap', (v) => v + 'ms'],
      events: ['t_events', 'v_events', (v) => v + ''],
      wave: ['t_wave', 'v_wave', (v) => v + ''],
    };
    function refreshSliderLabels() {
      for (const k in sliders) { const [iid, vid, fmt] = sliders[k]; $(vid).textContent = fmt($(iid).value); }
    }
    for (const k in sliders) { $(sliders[k][0]).addEventListener('input', refreshSliderLabels); }

    function loadPresetIntoSliders(key) {
      const p = HeadCount.PRESETS[key];
      $('t_observe').value = p.observeMs; $('t_drop').value = p.dropMs; $('t_move').value = p.moveMs;
      $('t_gap').value = p.gapMs; $('t_events').value = p.events; $('t_wave').value = p.waveMax;
      $('t_chimney').checked = p.chimney;
      refreshSliderLabels();
    }
    loadPresetIntoSliders(state.presetKey);

    function currentOverrides() {
      return {
        observeMs: +$('t_observe').value, dropMs: +$('t_drop').value, moveMs: +$('t_move').value,
        gapMs: +$('t_gap').value, events: +$('t_events').value, waveMax: +$('t_wave').value,
        chimney: $('t_chimney').checked,
      };
    }

    // --- broadcast helpers ---
    // Cross-device relay: keep a declarative snapshot (round/roundNo/phase/scores)
    // so late-joining or reconnecting displays render the correct static view,
    // and emit imperative events for animation triggers.
    let _sync = null;
    const _snap = { round: null, roundNo: state.roundNo, phase: 'idle', scores: { ...state.scores }, verdicts: { thu: '', pku: '' }, startedAt: null };
    function pushSnap(patch) { Object.assign(_snap, patch); if (_sync) _sync.pushState(_snap); }
    function pushEvt(type, extra) { if (_sync) _sync.pushEvent(Object.assign({ type }, extra || {})); }

    function post(msg) {
      if (bc) bc.postMessage(msg);            // same-device fallback (player listens on bc)
      if (!msg || !msg.type) return;
      switch (msg.type) {
        case 'round':   pushSnap({ round: msg.round, roundNo: msg.roundNo, phase: 'ready', verdicts: { thu: '', pku: '' }, startedAt: null });
                        pushEvt('round', { round: msg.round, roundNo: msg.roundNo }); break;
        case 'start': {
                        const startedAt = msg.startedAt || Date.now();
                        pushSnap({ phase: 'observe', startedAt });
                        pushEvt('start', { startedAt }); break;
                      }
        case 'reveal':  pushSnap({ phase: 'reveal' });  pushEvt('reveal'); break;
        case 'reset':   pushSnap({ phase: 'idle', round: null, verdicts: { thu: '', pku: '' }, startedAt: null }); pushEvt('reset'); break;
        case 'scores':  pushSnap({ scores: { thu: msg.thu, pku: msg.pku }, roundNo: msg.roundNo }); break;
        case 'verdict': pushSnap({ verdicts: { ..._snap.verdicts, [msg.team]: msg.value } });
                        pushEvt('verdict', { team: msg.team, value: msg.value }); break;
        case 'ping':    pushEvt('ping'); break;
      }
    }
    function pushScores() {
      $('sThu').textContent = state.scores.thu;
      $('sPku').textContent = state.scores.pku;
      localStorage.setItem('hc_scores', JSON.stringify(state.scores));
      post({ type: 'scores', thu: state.scores.thu, pku: state.scores.pku, roundNo: state.roundNo });
    }

    // --- actions ---
    $('reseed').onclick = () => { $('seed').value = HeadCount.makeSeedString((Date.now() ^ Math.floor(Math.random() * 1e9)) >>> 0); };

    $('gen').onclick = () => {
      const round = HeadCount.generateRound({
        presetKey: state.presetKey,
        seed: $('seed').value.trim() || undefined,
        overrides: currentOverrides(),
      });
      $('seed').value = round.seed;
      state.round = round;
      state.revealed = false;
      mini.setRound(round);
      post({ type: 'round', round, roundNo: state.roundNo });
      // info panel
      $('startMeta').textContent = '起始人数：' + round.initialCount;
      $('roundLabel').textContent = '第 ' + state.roundNo + ' 题';
      const list = $('eventList'); list.innerHTML = '';
      round.events.forEach((ev) => {
        const s = document.createElement('span');
        s.className = 'e ' + ev.type;
        s.textContent = HeadCount.describeEvent(ev);
        list.appendChild(s);
      });
      // reveal answer to host immediately (host-only panel)
      $('answer').textContent = round.answer;
      $('start').disabled = false; $('replay').disabled = false;
      $('reveal').disabled = false; $('judge').disabled = true; $('next').disabled = true;
      $('vThu').textContent = ''; $('vPku').textContent = '';
      $('aThu').value = ''; $('aPku').value = '';
    };

    $('start').onclick = () => { if (!state.round) return; const startedAt = Date.now(); mini.startObserve(); post({ type: 'start', startedAt }); };
    $('replay').onclick = () => {
      if (!state.round) return;
      mini.setRound(state.round); post({ type: 'round', round: state.round, roundNo: state.roundNo });
      setTimeout(() => { const startedAt = Date.now(); mini.startObserve(); post({ type: 'start', startedAt }); }, 80);
    };
    $('reveal').onclick = () => {
      if (!state.round) return;
      mini.reveal(); post({ type: 'reveal' });
      state.revealed = true; $('judge').disabled = false; $('next').disabled = false;
    };

    $('next').onclick = () => {
      state.roundNo += 1; localStorage.setItem('hc_roundNo', state.roundNo);
      $('roundLabel').textContent = '第 ' + state.roundNo + ' 题';
      $('seed').value = '';
      mini.reset(); post({ type: 'reset' });
      $('answer').textContent = '—'; $('startMeta').textContent = '起始人数：—'; $('eventList').innerHTML = '';
      $('start').disabled = true; $('replay').disabled = true; $('reveal').disabled = true;
      $('judge').disabled = true; $('next').disabled = true;
      pushScores();
    };

    // judge
    function verdictFor(team, val) {
      const correct = state.round && (+val === state.round.answer);
      const node = team === 'thu' ? $('vThu') : $('vPku');
      node.className = 'v ' + (correct ? 'right' : 'wrong');
      node.textContent = correct ? '✓ 正确 +1' : '✗ 错误';
      post({ type: 'verdict', team, value: correct ? 'right' : 'wrong' });
      return correct;
    }
    $('judge').onclick = () => {
      if (!state.round) return;
      const aThu = $('aThu').value, aPku = $('aPku').value;
      if (aThu !== '') { if (verdictFor('thu', aThu)) state.scores.thu += 1; }
      if (state.mode === 'both' && aPku !== '') { if (verdictFor('pku', aPku)) state.scores.pku += 1; }
      pushScores();
    };
    document.querySelectorAll('.miniadj button').forEach(b => {
      b.onclick = () => { state.scores[b.dataset.team] += (+b.dataset.d); if (state.scores[b.dataset.team] < 0) state.scores[b.dataset.team] = 0; pushScores(); };
    });
    $('resetScores').onclick = () => { if (!confirm('确定清零双队比分？')) return; state.scores = { thu: 0, pku: 0 }; pushScores(); };

    // player window
    $('openPlayer').onclick = () => { window.open('player.html', 'hc_player', 'width=1280,height=800'); };
    $('pingPlayer').onclick = () => post({ type: 'ping' });

    function setConn(ready) {
      state.playerReady = ready;
      const c = $('conn');
      c.textContent = ready ? '选手屏已连接' : '选手屏未连接';
      c.className = 'pill ' + (ready ? 'live' : 'off');
    }

    if (bc) {
      bc.onmessage = (e) => {
        const m = e.data;
        if (m && m.type === 'player-ready') {
          setConn(true);
          if (state.round) post({ type: 'round', round: state.round, roundNo: state.roundNo });
          pushScores();
        }
      };
    }

    // init
    setConn(false);
    pushScores();
    $('roundLabel').textContent = '第 ' + state.roundNo + ' 题';

    // Cross-device: claim the single-console lock, then push an initial snapshot.
    (async () => {
      if (!window.Sync) return;
      _sync = Sync.console('head-count');
      let res = await _sync.claim(false);
      if (res && !res.ok) { if (confirm('已有一个控制台在线，是否强制接管？')) res = await _sync.claim(true); }
      if (res && res.ok) pushSnap({ scores: state.scores, roundNo: state.roundNo });
    })();
  </script>
</body>
</html>
